<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy browser offcanvas smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:300px;border:1px solid #999}</style></head><body><div id="status">Running browser offcanvas smoke assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=offcanvas"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+': expected '+JSON.stringify(w)+', got '+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now();while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame);if(d){const off=d.querySelector("[data-we-widget='offcanvas']");const openEnd=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='open-end');const close=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='close');if(off&&openEnd&&close)return{off,openEnd,close};}await sleep(25);}throw new Error('Timed out waiting for offcanvas smoke UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(t);res();},{once:true});});const ui=await waitForUI(f,2e4);assertEqual(ui.off.getAttribute('class'),'we-offcanvas','initial closed class');ui.openEnd.click();await sleep(80);assertEqual(ui.off.getAttribute('class'),'we-offcanvas is-open','open class after click');ui.close.click();await sleep(80);assertEqual(ui.off.getAttribute('class'),'we-offcanvas','closed class after close');setStatus('PASS\noffcanvas open/close toggles class','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
