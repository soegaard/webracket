<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser theme vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser theme-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tab-panel" title="web-easy theme vars app"></iframe>

  <script src="./theme-contract-helper.js"></script>
  <script>
    const themeHelper = window.themeContractHelper;
    const THEME_LAYER_OPTIONS = {
      themeClass: "we-theme-solar2",
      coreHref: "../web-easy-core.css",
      themeHref: "../theme-contract-vars.css"
    };

    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function selectedTabButton(frameDoc) {
      return frameDoc.querySelector("button[aria-selected='true']");
    }
    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc) {
          const selected = selectedTabButton(frameDoc);
          if (selected) {
            return { frameDoc, selected };
          }
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for theme-vars smoke UI");
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const bgBefore = themeHelper.normalizedCssColor(getComputedStyle(ui.selected).backgroundColor);
        const borderBefore = themeHelper.normalizedCssColor(getComputedStyle(ui.selected).borderTopColor);

        ui.frameDoc.documentElement.style.setProperty("--we-bg-selected", "rgb(250, 250, 180)");
        ui.frameDoc.documentElement.style.setProperty("--we-border-strong", "rgb(2, 90, 2)");
        await themeHelper.sleep(80);

        const bgAfter = themeHelper.normalizedCssColor(getComputedStyle(ui.selected).backgroundColor);
        const borderAfter = themeHelper.normalizedCssColor(getComputedStyle(ui.selected).borderTopColor);

        themeHelper.assertTrue(bgAfter === "rgb(250,250,180)", "selected-tab background follows --we-bg-selected");
        themeHelper.assertTrue(borderAfter === "rgb(2,90,2)", "selected-tab border follows --we-border-strong");
        themeHelper.assertTrue(bgAfter !== bgBefore, "selected-tab background changed after var update");
        themeHelper.assertTrue(borderAfter !== borderBefore, "selected-tab border changed after var update");

        const progressDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=progress",
          (d) => d.querySelector("progress") && Array.from(d.querySelectorAll("button")).some((b) => b.textContent.trim() === "warn"),
          20000
        );
        const progress = progressDoc.querySelector("progress");
        const warnBtn = Array.from(progressDoc.querySelectorAll("button"))
          .find((b) => b.textContent.trim() === "warn");
        themeHelper.assertTrue(!!progress, "progress present in progress capsule");
        themeHelper.assertTrue(!!warnBtn, "warn button present in progress capsule");

        warnBtn.click();
        await themeHelper.sleep(80);
        progressDoc.documentElement.style.setProperty("--we-progress-warn", "rgb(18, 120, 210)");
        await themeHelper.sleep(80);

        const accentAfter = themeHelper.normalizedCssColor(getComputedStyle(progress).accentColor);
        themeHelper.assertTrue(accentAfter === "rgb(18,120,210)", "progress warn accent follows --we-progress-warn");

        setStatus(
          "PASS\nselected tab + progress styles update via CSS variables",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
