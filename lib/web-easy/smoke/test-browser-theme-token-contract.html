<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser theme token contract test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser theme token contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-full" title="web-easy theme token contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function normalizedCssColor(v) {
      return (v || "").replace(/\s+/g, "").toLowerCase();
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const bar = frameDoc.querySelector(".we-menu-bar[role='menubar']");
          if (bar) {
            return { frameDoc, bar };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for theme token contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const rootStyle = getComputedStyle(ui.frameDoc.documentElement);
        const requiredTokens = [
          "--we-focus",
          "--we-bg",
          "--we-bg-subtle",
          "--we-bg-selected",
          "--we-border",
          "--we-border-menu",
          "--we-border-strong",
          "--we-overlay"
        ];

        for (const token of requiredTokens) {
          const value = (rootStyle.getPropertyValue(token) || "").trim();
          assertTrue(value.length > 0, token + " is defined");
        }

        const bgBefore = normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);
        ui.frameDoc.documentElement.style.setProperty("--we-bg-subtle", "rgb(248, 240, 220)");
        await sleep(80);
        const bgAfter = normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);

        assertTrue(bgAfter === "rgb(248,240,220)", "menu bar background updates from --we-bg-subtle");
        assertTrue(bgAfter !== bgBefore, "menu bar background changed after token override");

        setStatus(
          "PASS\nrequired --we-* tokens are defined; token override changes widget style",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
