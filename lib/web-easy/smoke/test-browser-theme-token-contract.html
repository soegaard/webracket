<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser theme token contract test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 300px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser theme token contract assertions...</div>
  <iframe id="app-frame" src="about:blank" title="web-easy theme token contract app"></iframe>

  <script src="./themes/theme-contract-helper.js"></script>
  <script>
    const themeHelper = window.themeContractHelper;
    const THEME_LAYER_OPTIONS = {
      themeClass: "we-theme-solar2",
      coreHref: "../themes/web-easy-core.css",
      themeHref: "../themes/theme-contract-vars.css"
    };

    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    function assertTokenDefined(rootStyle, tokenName) {
      const value = (rootStyle.getPropertyValue(tokenName) || "").trim();
      themeHelper.assertTrue(value.length > 0, tokenName + " is defined");
    }

    function assertHook(frameDoc, selector, label) {
      themeHelper.assertTrue(!!frameDoc.querySelector(selector), label + " hook present");
    }

    async function checkMenuBarBgToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=menu-full",
        (d) => d.querySelector(".we-menu-bar[role='menubar']"),
        timeoutMs
      );
      const menuBar = doc.querySelector(".we-menu-bar[role='menubar']");
      const before = themeHelper.normalizedCssColor(getComputedStyle(menuBar).backgroundColor);
      doc.documentElement.style.setProperty("--we-bg-subtle", "rgb(248, 240, 220)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(menuBar).backgroundColor);
      themeHelper.assertTrue(after === "rgb(248,240,220)", "menu bar background updates from --we-bg-subtle");
      themeHelper.assertTrue(after !== before, "menu bar background changed after token override");
    }

    async function checkCardBgToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=card",
        (d) => d.querySelector(".we-card-header"),
        timeoutMs
      );
      const cardHeader = doc.querySelector(".we-card-header");
      const before = themeHelper.normalizedCssColor(getComputedStyle(cardHeader).backgroundColor);
      doc.documentElement.style.setProperty("--we-bg-subtle", "rgb(242, 235, 252)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(cardHeader).backgroundColor);
      themeHelper.assertTrue(after === "rgb(242,235,252)", "card header background updates from --we-bg-subtle");
      themeHelper.assertTrue(after !== before, "card header background changed after token override");
    }

    async function checkSelectedBgToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=pagination",
        (d) => d.querySelector(".we-page-btn.is-current"),
        timeoutMs
      );
      const currentPageBtn = doc.querySelector(".we-page-btn.is-current");
      const before = themeHelper.normalizedCssColor(getComputedStyle(currentPageBtn).backgroundColor);
      doc.documentElement.style.setProperty("--we-bg-selected", "rgb(222, 240, 255)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(currentPageBtn).backgroundColor);
      themeHelper.assertTrue(after === "rgb(222,240,255)", "selected page background updates from --we-bg-selected");
      themeHelper.assertTrue(after !== before, "selected page background changed after token override");
    }

    async function checkMutedFgToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=breadcrumb",
        (d) => d.querySelector(".we-breadcrumb-sep"),
        timeoutMs
      );
      const sep = doc.querySelector(".we-breadcrumb-sep");
      const before = themeHelper.normalizedCssColor(getComputedStyle(sep).color);
      doc.documentElement.style.setProperty("--we-fg-muted", "rgb(10, 120, 90)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(sep).color);
      themeHelper.assertTrue(after === "rgb(10,120,90)", "breadcrumb separator color updates from --we-fg-muted");
      themeHelper.assertTrue(after !== before, "breadcrumb separator color changed after token override");
    }

    async function checkOffcanvasBgToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=offcanvas",
        (d) => d.querySelector(".we-offcanvas-panel"),
        timeoutMs
      );
      const panel = doc.querySelector(".we-offcanvas-panel");
      const before = themeHelper.normalizedCssColor(getComputedStyle(panel).backgroundColor);
      doc.documentElement.style.setProperty("--we-bg", "rgb(240, 244, 252)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(panel).backgroundColor);
      themeHelper.assertTrue(after === "rgb(240,244,252)", "offcanvas panel background updates from --we-bg");
      themeHelper.assertTrue(after !== before, "offcanvas panel background changed after token override");
    }

    async function checkScrollspySelectedToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=scrollspy",
        (d) => d.querySelector(".we-scrollspy-item"),
        timeoutMs
      );
      const docs = Array.from(doc.querySelectorAll(".we-scrollspy-item"))
        .find((n) => n.textContent.trim() === "Docs");
      if (docs) {
        docs.click();
      }
      await themeHelper.sleep(80);

      const currentBefore = doc.querySelector(".we-scrollspy-item.is-current")
        || doc.querySelector(".we-scrollspy-item[aria-current='true']")
        || doc.querySelector(".we-scrollspy-item[aria-current='page']");
      themeHelper.assertTrue(!!currentBefore, "scrollspy has a current item");
      const before = themeHelper.normalizedCssColor(getComputedStyle(currentBefore).backgroundColor);

      doc.documentElement.style.setProperty("--we-bg-selected", "rgb(225, 240, 210)");
      await themeHelper.sleep(80);

      const currentAfter = doc.querySelector(".we-scrollspy-item.is-current")
        || doc.querySelector(".we-scrollspy-item[aria-current='true']")
        || doc.querySelector(".we-scrollspy-item[aria-current='page']");
      themeHelper.assertTrue(!!currentAfter, "scrollspy still has a current item");
      const after = themeHelper.normalizedCssColor(getComputedStyle(currentAfter).backgroundColor);
      themeHelper.assertTrue(after === "rgb(225,240,210)", "scrollspy current item background updates from --we-bg-selected");
      themeHelper.assertTrue(after !== before, "scrollspy current item background changed after token override");
    }

    async function checkScrollspyThemeHooks(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=scrollspy",
        (d) => d.querySelector("[data-we-widget='scrollspy-item']"),
        timeoutMs
      );
      assertHook(doc, "[data-we-widget='scrollspy'].we-scrollspy", "scrollspy");
      assertHook(doc, "[data-we-widget='scrollspy-nav'].we-scrollspy-nav", "scrollspy nav");
      assertHook(doc, "[data-we-widget='scrollspy-sections'].we-scrollspy-sections", "scrollspy sections");
      assertHook(doc, "[data-we-widget='scrollspy-section'].we-scrollspy-section", "scrollspy section");
      assertHook(doc, "[data-we-widget='scrollspy-item'].we-scrollspy-item", "scrollspy item");
    }

    async function checkCloseButtonIconToken(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=close-button",
        (d) => d.querySelector("[data-we-widget='close-button-icon']"),
        timeoutMs
      );
      const icon = doc.querySelector("[data-we-widget='close-button-icon']");
      const before = themeHelper.normalizedCssColor(getComputedStyle(icon).color);
      doc.documentElement.style.setProperty("--we-fg", "rgb(13, 97, 163)");
      await themeHelper.sleep(80);
      const after = themeHelper.normalizedCssColor(getComputedStyle(icon).color);
      themeHelper.assertTrue(after === "rgb(13,97,163)", "close-button icon color updates from --we-fg");
      themeHelper.assertTrue(after !== before, "close-button icon color changed after token override");
    }

    async function checkHeadingTokens(frame, timeoutMs) {
      const doc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=headings",
        (d) => d.querySelector("[data-we-widget='heading-with-subtitle']"),
        timeoutMs
      );
      const heading = Array.from(doc.querySelectorAll("[data-we-widget='heading']"))
        .find((n) => (n.textContent || "").trim() === "Smoke Heading");
      const display = doc.querySelector("[data-we-widget='display-heading']");
      const subtitle = doc.querySelector("[data-we-widget='heading-subtitle']");
      const lead = doc.querySelector("[data-we-widget='lead']");

      const beforeHeading = themeHelper.normalizedCssColor(getComputedStyle(heading).color);
      const beforeDisplay = themeHelper.normalizedCssColor(getComputedStyle(display).color);
      const beforeSubtitle = themeHelper.normalizedCssColor(getComputedStyle(subtitle).color);
      const beforeLead = themeHelper.normalizedCssColor(getComputedStyle(lead).color);

      doc.documentElement.style.setProperty("--we-heading-fg", "rgb(90, 40, 180)");
      doc.documentElement.style.setProperty("--we-display-heading-fg", "rgb(15, 110, 185)");
      doc.documentElement.style.setProperty("--we-heading-subtitle-fg", "rgb(120, 120, 120)");
      doc.documentElement.style.setProperty("--we-lead-fg", "rgb(80, 96, 112)");
      await themeHelper.sleep(80);

      const afterHeading = themeHelper.normalizedCssColor(getComputedStyle(heading).color);
      const afterDisplay = themeHelper.normalizedCssColor(getComputedStyle(display).color);
      const afterSubtitle = themeHelper.normalizedCssColor(getComputedStyle(subtitle).color);
      const afterLead = themeHelper.normalizedCssColor(getComputedStyle(lead).color);

      themeHelper.assertTrue(afterHeading === "rgb(90,40,180)", "heading color updates from --we-heading-fg");
      themeHelper.assertTrue(afterHeading !== beforeHeading, "heading color changed after token override");
      themeHelper.assertTrue(afterDisplay === "rgb(15,110,185)", "display heading color updates from --we-display-heading-fg");
      themeHelper.assertTrue(afterDisplay !== beforeDisplay, "display heading color changed after token override");
      themeHelper.assertTrue(afterSubtitle === "rgb(120,120,120)", "subtitle color updates from --we-heading-subtitle-fg");
      themeHelper.assertTrue(afterSubtitle !== beforeSubtitle, "subtitle color changed after token override");
      themeHelper.assertTrue(afterLead === "rgb(80,96,112)", "lead color updates from --we-lead-fg");
      themeHelper.assertTrue(afterLead !== beforeLead, "lead color changed after token override");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        const timeoutMs = 20000;

        const tokenDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=menu-full",
          (d) => d.querySelector(".we-menu-bar[role='menubar']"),
          timeoutMs
        );
        const rootStyle = getComputedStyle(tokenDoc.documentElement);
        const requiredTokens = [
          "--we-focus",
          "--we-bg",
          "--we-bg-subtle",
          "--we-bg-selected",
          "--we-border",
          "--we-border-menu",
          "--we-border-strong",
          "--we-overlay",
          "--we-progress-success",
          "--we-progress-warning",
          "--we-progress-danger",
          "--we-heading-fg",
          "--we-display-heading-fg",
          "--we-heading-subtitle-fg",
          "--we-lead-fg",
          "--we-heading-space-compact",
          "--we-heading-space-normal",
          "--we-heading-space-loose"
        ];
        for (const token of requiredTokens) {
          assertTokenDefined(rootStyle, token);
        }

        await checkMenuBarBgToken(frame, timeoutMs);
        await checkCardBgToken(frame, timeoutMs);
        await checkSelectedBgToken(frame, timeoutMs);
        await checkMutedFgToken(frame, timeoutMs);
        await checkOffcanvasBgToken(frame, timeoutMs);
        await checkScrollspySelectedToken(frame, timeoutMs);
        await checkScrollspyThemeHooks(frame, timeoutMs);
        await checkCloseButtonIconToken(frame, timeoutMs);
        await checkHeadingTokens(frame, timeoutMs);

        setStatus(
          "PASS\nrequired --we-* tokens are defined; overrides affect menu/card/pagination/breadcrumb/offcanvas/scrollspy/close-icon/headings/heading-spacing",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
