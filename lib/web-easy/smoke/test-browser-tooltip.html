<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser tooltip smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser tooltip smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tooltip" title="web-easy tooltip smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const trigger = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "apply");
          const bubble = frameDoc.querySelector("[data-we-widget='tooltip-bubble']");
          const setLong = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-long");
          if (trigger && bubble && setLong) {
            return { frameDoc, trigger, bubble, setLong };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for tooltip smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.bubble.getAttribute("class"), "we-tooltip-bubble", "tooltip bubble class");
        assertEqual(ui.bubble.textContent.trim(), "Click to apply", "initial tooltip text");
        assertTrue(!!ui.bubble.getAttribute("id"), "tooltip bubble id exists");
        assertEqual(ui.trigger.getAttribute("aria-describedby"), ui.bubble.getAttribute("id"), "trigger aria-describedby points to bubble");

        ui.setLong.click();
        await sleep(100);

        assertEqual(ui.bubble.textContent.trim(), "Click to apply deployment profile", "tooltip text after update");
        setStatus("PASS\ntooltip sets aria-describedby and updates bubble text", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
