<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy divider contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running divider contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=divider" title="web-easy divider contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=divider", (d) => d.querySelectorAll("[data-we-widget='divider']").length >= 2, 20000);
        H.assertNoForbiddenAttrTokens(doc, "divider-contract");
        H.assertNoInlineWidgetStyles(doc, "divider-contract");
        const dividers = Array.from(doc.querySelectorAll("[data-we-widget='divider']"));
        const classes = dividers.map((d) => d.getAttribute("class") || "");
        H.assertTrue(classes.some((c) => c.includes("we-divider-horizontal")), "horizontal divider class");
        H.assertTrue(classes.some((c) => c.includes("we-divider-vertical")), "vertical divider class");
        H.setStatus("PASS\ndivider contract: orientation class mapping", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
