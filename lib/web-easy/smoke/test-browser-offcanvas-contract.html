<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy offcanvas contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:300px;border:1px solid #999}</style></head><body><div id="status">Running offcanvas contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=offcanvas"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));} function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+': expected '+JSON.stringify(w)+', got '+JSON.stringify(g));}
async function waitForUI(frame,t){const s=Date.now();while(Date.now()-s<t){const d=frameDocFrom(frame);if(d){const openStart=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='open-start');const panel=d.querySelector("[data-we-widget='offcanvas-panel']");if(openStart&&panel)return{openStart,panel};}await sleep(25);}throw new Error('Timed out waiting for offcanvas contract UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const tt=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(tt);res();},{once:true});});const ui=await waitForUI(f,2e4);ui.openStart.click();await sleep(80);assertEqual(ui.panel.getAttribute('class'),'we-offcanvas-panel is-start','offcanvas panel side class after open-start');setStatus('PASS\noffcanvas contract: side class + panel hook','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
