<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser theme progress-vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser theme progress-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=progress" title="web-easy theme progress vars app"></iframe>

  <script src="./theme-contract-helper.js"></script>
  <script>
    const themeHelper = window.themeContractHelper;
    const THEME_LAYER_OPTIONS = {
      themeClass: "we-theme-solar2",
      coreHref: "../web-easy-core.css",
      themeHref: "../theme-contract-vars.css"
    };

    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc) {
          const progress = frameDoc.querySelector("progress");
          const warnBtn = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "warn");
          const errorBtn = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "error");
          if (progress && warnBtn && errorBtn) {
            return { frameDoc, progress, warnBtn, errorBtn };
          }
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for theme progress-vars smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        ui.warnBtn.click();
        await themeHelper.sleep(80);
        ui.frameDoc.documentElement.style.setProperty("--we-progress-warn", "rgb(18, 120, 210)");
        await themeHelper.sleep(80);
        themeHelper.assertTrue(
          themeHelper.normalizedCssColor(getComputedStyle(ui.progress).accentColor) === "rgb(18,120,210)",
          "warn accent follows --we-progress-warn"
        );

        ui.errorBtn.click();
        await themeHelper.sleep(80);
        ui.frameDoc.documentElement.style.setProperty("--we-progress-error", "rgb(170, 30, 120)");
        await themeHelper.sleep(80);
        themeHelper.assertTrue(
          themeHelper.normalizedCssColor(getComputedStyle(ui.progress).accentColor) === "rgb(170,30,120)",
          "error accent follows --we-progress-error"
        );

        setStatus("PASS\nprogress variant accent colors follow progress theme tokens", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
