<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy pagination contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:260px;border:1px solid #999}</style></head>
<body><div id="status">Running pagination contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=pagination" title="web-easy pagination contract app"></iframe>
<script>
function setStatus(t,c){const s=document.getElementById("status");s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+": expected "+JSON.stringify(w)+", got "+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now(); while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame); if(d){const nav=d.querySelector("[data-we-widget='pagination']"); const prev=Array.from(d.querySelectorAll("button")).find((b)=>b.textContent.trim()==="Prev"); const next=Array.from(d.querySelectorAll("button")).find((b)=>b.textContent.trim()==="Next"); if(nav&&prev&&next)return{d,nav,prev,next};} await sleep(25);} throw new Error("Timed out waiting for pagination contract UI");}
(async function run(){try{const frame=document.getElementById("app-frame"); await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error("Timed out loading iframe")),20000); frame.addEventListener("load",()=>{clearTimeout(t);res();},{once:true});}); const ui=await waitForUI(frame,20000);
const currentBefore=Array.from(ui.d.querySelectorAll("[data-we-widget='page-button']")).find((b)=>b.getAttribute("class")==="we-page-btn is-current"); assertEqual(currentBefore.textContent.trim(),"2","initial current page"); ui.next.click(); await sleep(100); const currentAfter=Array.from(ui.d.querySelectorAll("[data-we-widget='page-button']")).find((b)=>b.getAttribute("class")==="we-page-btn is-current"); assertEqual(currentAfter.textContent.trim(),"3","current page after next"); setStatus("PASS\npagination contract: current page transitions with controls","pass");}catch(err){console.error(err); setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
