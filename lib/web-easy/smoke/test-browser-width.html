<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser width-policy smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 340px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser width-policy assertions...</div>
  <iframe id="app-frame" src="./example-browser-width.html" title="web-easy width policy app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function widthOf(el) {
      return el.getBoundingClientRect().width;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const fieldset = frameDoc.querySelector("fieldset");
          const input = frameDoc.querySelector("input[type='text'], input:not([type]), input[type='']");
          const checkbox = frameDoc.querySelector("input[type='checkbox']");
          const select = frameDoc.querySelector("select");
          const slider = frameDoc.querySelector("input[type='range']");
          const progress = frameDoc.querySelector("progress");
          const button = frameDoc.querySelector("button");
          const table = frameDoc.querySelector("table");
          if (fieldset && input && checkbox && select && slider && progress && button && table) {
            return { frameDoc, fieldset, input, checkbox, select, slider, progress, button, table };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for width-policy smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const groupW = widthOf(ui.fieldset);
        const inputW = widthOf(ui.input);
        const checkboxW = widthOf(ui.checkbox);
        const selectW = widthOf(ui.select);
        const sliderW = widthOf(ui.slider);
        const progressW = widthOf(ui.progress);
        const buttonW = widthOf(ui.button);
        const tableW = widthOf(ui.table);

        assertTrue(inputW > groupW * 0.90, "input is fill-width");
        assertTrue(checkboxW < groupW * 0.60, "checkbox is content-width");
        assertTrue(selectW < groupW * 0.80, "choice/select is content-width");
        assertTrue(sliderW < groupW * 0.80, "slider is content-width");
        assertTrue(progressW < groupW * 0.80, "progress is content-width");
        assertTrue(buttonW < groupW * 0.60, "button is content-width");
        assertTrue(tableW < groupW * 0.95, "table is content-width");

        setStatus(
          "PASS\ninput fill-width; checkbox/select/slider/progress/button/table content-width",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
