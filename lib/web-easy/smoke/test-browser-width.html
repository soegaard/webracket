<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser width-policy smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 340px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser width-policy assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=width" title="web-easy width policy app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function widthOf(el) {
      return el.getBoundingClientRect().width;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const fieldset = Array.from(frameDoc.querySelectorAll("fieldset"))
            .find((fs) => {
              const lg = fs.querySelector("legend");
              return lg && (lg.textContent || "").trim() === "Width Policy";
            });
          const input = fieldset && fieldset.querySelector("input[type='text'], input:not([type]), input[type='']");
          const checkbox = fieldset && fieldset.querySelector("input[type='checkbox']");
          const select = fieldset && fieldset.querySelector("select");
          const slider = fieldset && fieldset.querySelector("input[type='range']");
          const progress = fieldset && fieldset.querySelector("progress");
          const button = fieldset && fieldset.querySelector("button");
          const table = fieldset && fieldset.querySelector("table");
          if (fieldset && input && checkbox && select && slider && progress && button && table) {
            return { frameDoc, fieldset, input, checkbox, select, slider, progress, button, table };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for width-policy smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const inputW = widthOf(ui.input);
        const checkboxW = widthOf(ui.checkbox);
        const selectW = widthOf(ui.select);
        const sliderW = widthOf(ui.slider);
        const progressW = widthOf(ui.progress);
        const buttonW = widthOf(ui.button);
        const tableW = widthOf(ui.table);

        assertTrue(inputW > 200, "input has non-trivial width");
        assertTrue(checkboxW > inputW * 0.95, "checkbox is fill-width vs input");
        assertTrue(selectW > inputW * 0.95, "choice/select is fill-width vs input");
        assertTrue(sliderW > inputW * 0.95, "slider is fill-width vs input");
        assertTrue(buttonW > inputW * 0.95, "button is fill-width vs input");
        assertTrue(tableW > inputW * 0.95, "table is fill-width vs input");
        assertTrue(progressW < inputW * 0.30, "progress remains content-width vs input");

        setStatus(
          "PASS\ninput/checkbox/select/slider/button/table fill-width; progress content-width",
          "pass"
        );
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: input=" + (frameDoc.querySelector("input[type='text'], input:not([type]), input[type='']") ? widthOf(frameDoc.querySelector("input[type='text'], input:not([type]), input[type='']")) : -1) +
             " checkbox=" + (frameDoc.querySelector("input[type='checkbox']") ? widthOf(frameDoc.querySelector("input[type='checkbox']")) : -1) +
             " select=" + (frameDoc.querySelector("select") ? widthOf(frameDoc.querySelector("select")) : -1) +
             " slider=" + (frameDoc.querySelector("input[type='range']") ? widthOf(frameDoc.querySelector("input[type='range']")) : -1) +
             " progress=" + (frameDoc.querySelector("progress") ? widthOf(frameDoc.querySelector("progress")) : -1) +
             " button=" + (frameDoc.querySelector("button") ? widthOf(frameDoc.querySelector("button")) : -1) +
             " table=" + (frameDoc.querySelector("table") ? widthOf(frameDoc.querySelector("table")) : -1))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
