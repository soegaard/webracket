<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity dynamic list smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity dynamic-list assertions...</div>
  <iframe id="app-frame" src="./example-browser-parity-dynamic-list.html" title="web-easy parity dynamic list app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function indexOfToken(text, token) {
      return text.indexOf(token);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const buttons = frameDoc.querySelectorAll("button");
          const text = bodyText(frameDoc);
          if (buttons.length >= 4 && text.includes("a:0") && text.includes("b:0")) {
            return { frameDoc };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity dynamic-list UI");
    }

    function buttonByLabel(frameDoc, label) {
      const buttons = Array.from(frameDoc.querySelectorAll("button"));
      return buttons.find((b) => (b.textContent || "").trim() === label);
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        let text = bodyText(ui.frameDoc);
        assertTrue(text.includes("a:0") && text.includes("b:0"), "initial items a:0 and b:0");

        buttonByLabel(ui.frameDoc, "inc-a").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("a:1"), "after inc-a includes a:1");

        buttonByLabel(ui.frameDoc, "reorder").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(indexOfToken(text, "b:0") < indexOfToken(text, "a:1"), "after reorder order is b:0 then a:1");

        buttonByLabel(ui.frameDoc, "add-c").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("c:0"), "after add-c includes c:0");

        buttonByLabel(ui.frameDoc, "drop-b").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(!text.includes("b:0") && text.includes("a:1") && text.includes("c:0"),
          "after drop-b includes a:1 and c:0, excludes b:0");

        setStatus("PASS\ninitial: a:0,b:0; inc-a: a:1; reorder: b before a; add-c: c:0; drop-b: a:1,c:0", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
