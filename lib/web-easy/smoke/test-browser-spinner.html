<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser spinner smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser spinner smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=spinner" title="web-easy spinner smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const spinner = frameDoc.querySelector("[data-we-widget='spinner']");
          const label = frameDoc.querySelector("[data-we-widget='spinner-label']");
          const setSyncing = Array.from(frameDoc.querySelectorAll("button"))
            .find((e) => e.textContent.trim() === "set-syncing");
          if (spinner && label && setSyncing) {
            return { spinner, label, setSyncing };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for spinner smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.spinner.getAttribute("class"), "we-spinner", "spinner class");
        assertEqual(ui.label.textContent.trim(), "Loading...", "initial spinner label");

        ui.setSyncing.click();
        await sleep(100);

        assertEqual(ui.label.textContent.trim(), "Syncing", "spinner label after update");
        setStatus("PASS\nspinner renders and updates label", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
