<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity theme dialog-vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 300px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity theme dialog-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-dialog" title="web-easy parity theme dialog vars app"></iframe>

  <script src="./theme-contract-helper.js"></script>
  <script>
    const themeHelper = window.themeContractHelper;
    const THEME_LAYER_OPTIONS = {
      themeClass: "we-theme-solar2",
      coreHref: "../web-easy-core.css",
      themeHref: "../theme-contract-vars.css"
    };

    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function buttonByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => (b.textContent || "").trim() === label);
    }
    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc) {
          const openButton = buttonByText(frameDoc, "open-dialog");
          const dialog = frameDoc.querySelector(".we-dialog[role='dialog']");
          if (openButton && dialog) {
            return { frameDoc, openButton, dialog };
          }
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for parity theme dialog-vars UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        ui.openButton.click();
        await themeHelper.sleep(100);

        const panel = ui.frameDoc.querySelector(".we-dialog-panel");
        themeHelper.assertTrue(!!panel, "dialog panel exists");
        themeHelper.assertTrue(ui.dialog.getAttribute("aria-hidden") === "false", "dialog opened");

        const overlayBefore = themeHelper.normalizedCssColor(getComputedStyle(ui.dialog).backgroundColor);
        const borderBefore = themeHelper.normalizedCssColor(getComputedStyle(panel).borderTopColor);

        ui.frameDoc.documentElement.style.setProperty("--we-overlay", "rgba(120, 50, 0, 0.35)");
        ui.frameDoc.documentElement.style.setProperty("--we-border", "rgb(120, 60, 20)");
        await themeHelper.sleep(80);

        const overlayAfter = themeHelper.normalizedCssColor(getComputedStyle(ui.dialog).backgroundColor);
        const borderAfter = themeHelper.normalizedCssColor(getComputedStyle(panel).borderTopColor);

        themeHelper.assertTrue(overlayAfter === "rgba(120,50,0,0.35)", "dialog overlay follows --we-overlay");
        themeHelper.assertTrue(borderAfter === "rgb(120,60,20)", "dialog panel border follows --we-border");
        themeHelper.assertTrue(overlayAfter !== overlayBefore, "dialog overlay changed after var update");
        themeHelper.assertTrue(borderAfter !== borderBefore, "dialog panel border changed after var update");

        setStatus(
          "PASS\nparity dialog styles update via CSS variables (--we-overlay/--we-border)",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
