<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity theme dialog-vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 300px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity theme dialog-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-dialog" title="web-easy parity theme dialog vars app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    const CORE_CSS = "../web-easy-core.css";
    const THEME_CSS = "../theme-contract-vars.css";

    function ensureThemeLayer(frameDoc) {
      frameDoc.documentElement.classList.add("we-theme-solar2");
      let coreLink = frameDoc.getElementById("we-theme-core-css");
      if (!coreLink) {
        coreLink = frameDoc.createElement("link");
        coreLink.id = "we-theme-core-css";
        coreLink.rel = "stylesheet";
        frameDoc.head.appendChild(coreLink);
      }
      coreLink.href = CORE_CSS;

      let themeLink = frameDoc.getElementById("we-theme-external-css");
      if (!themeLink) {
        themeLink = frameDoc.createElement("link");
        themeLink.id = "we-theme-external-css";
        themeLink.rel = "stylesheet";
        frameDoc.head.appendChild(themeLink);
      }
      themeLink.href = THEME_CSS;
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function buttonByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => (b.textContent || "").trim() === label);
    }

    function normalizedCssColor(v) {
      return (v || "").replace(/\s+/g, "").toLowerCase();
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          ensureThemeLayer(frameDoc);
        }
        if (frameDoc) {
          const openButton = buttonByText(frameDoc, "open-dialog");
          const dialog = frameDoc.querySelector(".we-dialog[role='dialog']");
          if (openButton && dialog) {
            return { frameDoc, openButton, dialog };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity theme dialog-vars UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        ui.openButton.click();
        await sleep(100);

        const panel = ui.frameDoc.querySelector(".we-dialog-panel");
        assertTrue(!!panel, "dialog panel exists");
        assertTrue(ui.dialog.getAttribute("aria-hidden") === "false", "dialog opened");

        const overlayBefore = normalizedCssColor(getComputedStyle(ui.dialog).backgroundColor);
        const borderBefore = normalizedCssColor(getComputedStyle(panel).borderTopColor);

        ui.frameDoc.documentElement.style.setProperty("--we-overlay", "rgba(120, 50, 0, 0.35)");
        ui.frameDoc.documentElement.style.setProperty("--we-border", "rgb(120, 60, 20)");
        await sleep(80);

        const overlayAfter = normalizedCssColor(getComputedStyle(ui.dialog).backgroundColor);
        const borderAfter = normalizedCssColor(getComputedStyle(panel).borderTopColor);

        assertTrue(overlayAfter === "rgba(120,50,0,0.35)", "dialog overlay follows --we-overlay");
        assertTrue(borderAfter === "rgb(120,60,20)", "dialog panel border follows --we-border");
        assertTrue(overlayAfter !== overlayBefore, "dialog overlay changed after var update");
        assertTrue(borderAfter !== borderBefore, "dialog panel border changed after var update");

        setStatus(
          "PASS\nparity dialog styles update via CSS variables (--we-overlay/--we-border)",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
