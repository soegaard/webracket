<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy carousel contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:280px;border:1px solid #999}</style></head><body><div id="status">Running carousel contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=carousel"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));} function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertTrue(v,l){if(!v)throw new Error(l+': expected true, got false');}
async function waitForUI(frame,t){const s=Date.now();while(Date.now()-s<t){const d=frameDocFrom(frame);if(d){const inds=d.querySelectorAll("[data-we-widget='carousel-indicator']");if(inds.length>=3)return{d};}await sleep(25);}throw new Error('Timed out waiting for carousel contract UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const tt=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(tt);res();},{once:true});});const ui=await waitForUI(f,2e4);const i0=ui.d.querySelectorAll("[data-we-widget='carousel-indicator']")[0];const i1=ui.d.querySelectorAll("[data-we-widget='carousel-indicator']")[1];assertTrue(i0.getAttribute('class').includes('is-current'),'initial current indicator class');i1.click();await sleep(80);const i1After=ui.d.querySelectorAll("[data-we-widget='carousel-indicator']")[1];assertTrue(i1After.getAttribute('class').includes('is-current'),'current indicator class after click');setStatus('PASS\ncarousel contract: indicators + current class transition','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
