<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy solar2 accordion contract</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 820px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running solar2 accordion contract...</div>
  <iframe id="app-frame" src="./generated/example-browser-solar-showcase.html" title="solar2 accordion contract"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

    function assertTrue(v, label) {
      if (!v) throw new Error(label + ": expected true, got false");
    }

    function assertEqual(got, want, label) {
      if (got !== want) throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (doc && doc.querySelector("#solar2-accordions-body .we-accordion-trigger")) return doc;
        await sleep(25);
      }
      throw new Error("Timed out waiting for solar2 accordion section");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const doc = await waitForUI(frame, 20000);
        const triggers = Array.from(doc.querySelectorAll("#solar2-accordions-body .we-accordion-trigger"));
        assertTrue(triggers.length >= 3, "accordion trigger count");

        const openTrigger = triggers[0];
        const closedTrigger = triggers[1];
        assertEqual(openTrigger.classList.contains("is-open"), true, "first trigger open");
        assertEqual(closedTrigger.classList.contains("is-open"), false, "second trigger closed");

        closedTrigger.click();
        await sleep(120);

        assertEqual(closedTrigger.classList.contains("is-open"), true, "second trigger opens on click");
        assertEqual(openTrigger.classList.contains("is-open"), false, "first trigger closes when second opens");

        setStatus("PASS\nsolar2 accordion contract: single-open state transition", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
