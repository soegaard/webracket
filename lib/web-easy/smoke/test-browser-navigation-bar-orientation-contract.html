<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy navigation-bar orientation contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:320px;border:1px solid #999}</style></head>
<body><div id="status">Running navigation-bar orientation contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=navigation-bar-advanced"></iframe><script src="./smoke-harness.js"></script><script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-smoke-all.html?test=navigation-bar-advanced",(d)=>!!d.querySelector("[data-we-widget='navigation-bar']"),2e4);const bar=doc.querySelector("[data-we-widget='navigation-bar']");const toggle=Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="toggle-orientation");H.assertTrue((bar.getAttribute("class")||"").includes("is-vertical"),"initial class has is-vertical");toggle.click();await H.waitForCondition("navigation-bar class update",2e3,()=>!((bar.getAttribute("class")||"").includes("is-vertical")));H.assertTrue(!(bar.getAttribute("class")||"").includes("is-vertical"),"class drops is-vertical after toggle");H.setStatus("PASS\nnavigation-bar orientation contract", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
