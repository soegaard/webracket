<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser dialog smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser dialog assertions...</div>
  <div id="note">Keyboard note: use Left/Right for option groups (for example radios); use Tab/Shift+Tab for action buttons (cancel/confirm).</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=dialog" title="web-easy dialog app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function buttonByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => (b.textContent || "").trim() === label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const openButton = buttonByText(frameDoc, "open-dialog");
          const dialog = frameDoc.querySelector(".we-dialog[role='dialog']");
          const text = bodyText(frameDoc);
          if (openButton && dialog && text.includes("status:idle")) {
            return { frameDoc, openButton, dialog };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for dialog smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        let text = bodyText(ui.frameDoc);
        assertTrue(ui.dialog.getAttribute("aria-hidden") === "true", "dialog initially hidden");
        assertTrue(text.includes("status:idle"), "status idle");

        ui.openButton.focus();
        ui.openButton.click();
        await sleep(80);
        text = bodyText(ui.frameDoc);
        const cancelButtonAfterOpen = buttonByText(ui.frameDoc, "cancel");
        const closeButtonAfterOpen = ui.frameDoc.querySelector("[data-we-widget='dialog-close']");
        assertTrue(!!cancelButtonAfterOpen, "cancel button after open");
        assertTrue(ui.dialog.getAttribute("aria-hidden") === "false", "dialog visible after open");
        assertTrue(text.includes("Delete project?"), "dialog content rendered");
        assertTrue(text.includes("status:open"), "status after open");
        assertTrue(
          ui.dialog.contains(ui.frameDoc.activeElement) &&
          (ui.frameDoc.activeElement === cancelButtonAfterOpen ||
           ui.frameDoc.activeElement === closeButtonAfterOpen),
          "dialog initial focus moves inside panel"
        );

        ui.dialog.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(80);
        text = bodyText(ui.frameDoc);
        assertTrue(ui.dialog.getAttribute("aria-hidden") === "true", "dialog hidden after Escape");
        assertTrue(text.includes("status:escape"), "status after Escape");
        assertTrue(ui.frameDoc.activeElement === ui.openButton, "focus returns to trigger after Escape");

        ui.openButton.focus();
        ui.openButton.click();
        await sleep(80);
        const cancelButton = buttonByText(ui.frameDoc, "cancel");
        assertTrue(!!cancelButton, "cancel button present");
        cancelButton.click();
        await sleep(80);
        text = bodyText(ui.frameDoc);
        assertTrue(ui.dialog.getAttribute("aria-hidden") === "true", "dialog hidden after cancel");
        assertTrue(text.includes("status:cancel"), "status after cancel");
        assertTrue(ui.frameDoc.activeElement === ui.openButton, "focus returns to trigger after cancel");

        setStatus("PASS\ndialog open/close: open button, Escape, cancel", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: dialogs=" + frameDoc.querySelectorAll(".we-dialog").length +
             " buttons=" + frameDoc.querySelectorAll("button").length +
             " body=" + JSON.stringify(bodyText(frameDoc)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
