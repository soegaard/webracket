<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy modal close-reason contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:340px;border:1px solid #999}</style></head>
<body>
<div id="status">Running modal close-reason assertions...</div>
<iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=modal"></iframe>
<script src="./smoke-harness.js"></script>
<script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-smoke-all.html?test=modal",(d)=>!!d.querySelector("[data-we-widget='modal']"),2e4);const open=Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="open-modal");const cancel=()=>Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="cancel");const confirm=()=>Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="confirm");const status=()=>Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((n)=>(n.textContent||"").trim().startsWith("status:"));const modal=doc.querySelector("[data-we-widget='modal']");open.click();await H.sleep(80);cancel().click();await H.sleep(80);H.assertEqual((status().textContent||"").trim(),"status:cancel","status after cancel");open.click();await H.sleep(80);confirm().click();await H.sleep(80);H.assertEqual((status().textContent||"").trim(),"status:confirm","status after confirm");open.click();await H.sleep(80);H.dispatchKey(modal,"Escape");await H.sleep(80);H.assertEqual((status().textContent||"").trim(),"status:escape","status after Escape");H.setStatus("PASS\nmodal close-reason: cancel/confirm/escape", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script>
</body>
</html>
