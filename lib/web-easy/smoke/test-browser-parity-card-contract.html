<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity card contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:260px;border:1px solid #999}</style></head>
<body><div id="status">Running parity card contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-card" title="web-easy parity card contract app"></iframe>
<script>
function setStatus(t,c){const s=document.getElementById("status");s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+": expected "+JSON.stringify(w)+", got "+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now(); while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame); if(d){const header=d.querySelector("[data-we-widget='card-header']"); const footer=d.querySelector("[data-we-widget='card-footer']"); const footnote=Array.from(d.querySelectorAll("button")).find((e)=>e.textContent.trim()==="footnote"); if(header&&footer&&footnote)return{d,header,footer,footnote};} await sleep(25);} throw new Error("Timed out waiting for parity card contract UI");}
(async function run(){try{const frame=document.getElementById("app-frame"); await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error("Timed out loading iframe")),20000); frame.addEventListener("load",()=>{clearTimeout(t);res();},{once:true});}); const ui=await waitForUI(frame,20000);
assertEqual(ui.header.textContent.trim(),"Status","parity initial header"); ui.footnote.click(); await sleep(100); const f=ui.d.querySelector("[data-we-widget='card-footer']"); assertEqual(f.textContent.trim(),"updated","parity footer after update"); setStatus("PASS\nparity card contract: structure + reactive footer","pass");}catch(err){console.error(err); setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
