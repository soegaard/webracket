<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy link contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running link contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=link" title="web-easy link contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=link", (d) => d.querySelectorAll("[data-we-widget='link']").length >= 2, 20000);
        H.assertNoForbiddenAttrTokens(doc, "link-contract");
        H.assertNoInlineWidgetStyles(doc, "link-contract");
        const links = Array.from(doc.querySelectorAll("[data-we-widget='link']"));
        H.assertEqual(links[0].tagName, "A", "link tag");
        H.assertEqual(links[0].getAttribute("class"), "we-link", "link class");
        H.assertTrue((links[0].getAttribute("href") || "").includes("/docs"), "href attr");
        H.assertEqual(links[0].getAttribute("target"), "_blank", "target attr");
        H.assertTrue((links[1].getAttribute("download") || "") !== "", "download attr");
        H.setStatus("PASS\nlink contract: anchor/class/href/target/download", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
