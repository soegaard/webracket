<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 220px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser smoke assertions...</div>
  <iframe id="app-frame" src="./example-browser-smoke.html" title="web-easy smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function findFirstIntegerText(frameDoc) {
      const text = (frameDoc.body && frameDoc.body.textContent) ? frameDoc.body.textContent : "";
      const m = text.match(/-?\d+/);
      return m ? m[0] : null;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (frameDoc) {
          const button = frameDoc.querySelector("button");
          const numberText = findFirstIntegerText(frameDoc);
          if (button && numberText !== null) {
            return { frameDoc, button, numberText };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for smoke UI");
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const frameDoc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (!frameDoc) {
          throw new Error("No iframe document");
        }

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.numberText, "0", "initial counter");

        ui.button.click();
        await sleep(100);

        assertEqual(findFirstIntegerText(ui.frameDoc), "1", "counter after one click");
        setStatus("PASS\ninitial=0, after-click=1", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
