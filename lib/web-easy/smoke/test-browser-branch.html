<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser branch smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 240px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser branch smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=branch" title="web-easy branch smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const button = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "toggle");
          const text = frameDoc.body ? frameDoc.body.textContent || "" : "";
          if (button && (text.includes("ON") || text.includes("OFF"))) {
            return { frameDoc, button };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for branch smoke UI");
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    function hasText(frameDoc, token) {
      const text = frameDoc.body ? frameDoc.body.textContent || "" : "";
      return text.includes(token);
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(hasText(ui.frameDoc, "ON"), true, "initial branch text ON");

        ui.button.click();
        await sleep(100);
        assertEqual(hasText(ui.frameDoc, "OFF"), true, "branch text after first toggle OFF");

        ui.button.click();
        await sleep(100);
        assertEqual(hasText(ui.frameDoc, "ON"), true, "branch text after second toggle ON");

        setStatus("PASS\ninitial=ON; after-toggle=OFF; after-toggle-again=ON", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
