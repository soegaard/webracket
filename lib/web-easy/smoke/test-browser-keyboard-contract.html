<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy keyboard contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running keyboard-only contract assertions...</div>
  <iframe id="app-frame" src="about:blank" title="web-easy keyboard contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    function menuItemByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-item[role="menuitem"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function menuLabelByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function tabByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('button[role="tab"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function selectedTabLabel(frameDoc) {
      const selected = frameDoc.querySelector("button[role='tab'][aria-selected='true']");
      return selected ? (selected.textContent || "").trim() : "";
    }

    async function checkMenuKeyboardOnly(frame, timeoutMs) {
      const frameDoc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=menu-full",
        (d) => d.querySelectorAll('.we-menu-item[role="menuitem"]').length >= 4 && bodyText(d).includes("status:ready"),
        timeoutMs
      );

      const fileLabel = menuLabelByText(frameDoc, "File");
      const editLabel = menuLabelByText(frameDoc, "Edit");
      const openItem = menuItemByText(frameDoc, "open");
      const saveItem = menuItemByText(frameDoc, "save");
      assertTrue(!!fileLabel && !!editLabel && !!openItem && !!saveItem, "smoke menu nodes present");

      fileLabel.focus();
      await sleep(40);
      fileLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
      await sleep(60);
      assertTrue(fileLabel.getAttribute("aria-expanded") === "true", "Enter opens File menu");

      fileLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowDown", bubbles: true }));
      await sleep(60);
      assertTrue(frameDoc.activeElement === openItem, "ArrowDown focuses first item");

      openItem.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
      await sleep(60);
      assertTrue(editLabel.getAttribute("aria-expanded") === "true", "ArrowRight switches/open Edit");
      assertTrue(frameDoc.activeElement === editLabel, "ArrowRight moves focus to Edit");

      editLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowLeft", bubbles: true }));
      await sleep(60);
      assertTrue(fileLabel.getAttribute("aria-expanded") === "true", "ArrowLeft switches/open File");
      assertTrue(frameDoc.activeElement === fileLabel, "ArrowLeft moves focus back to File");

      fileLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "s", bubbles: true }));
      await sleep(60);
      assertTrue(frameDoc.activeElement === saveItem, "type-ahead s focuses save");

      saveItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
      await sleep(80);
      assertTrue(bodyText(frameDoc).includes("status:save"), "Enter on save invokes action");

      saveItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
      await sleep(60);
      assertTrue(fileLabel.getAttribute("aria-expanded") === "false", "Escape closes menu");
      assertTrue(frameDoc.activeElement === fileLabel, "Escape returns focus to label");
    }

    async function checkTabsKeyboardOnly(frame, timeoutMs) {
      const frameDoc = await loadCase(
        frame,
        "./generated/example-browser-smoke-all.html?test=tab-panel",
        (d) => d.querySelectorAll('button[role="tab"]').length >= 3,
        timeoutMs
      );

      const infoTab = tabByText(frameDoc, "info");
      assertTrue(!!infoTab, "info tab present");
      infoTab.focus();
      await sleep(40);
      assertTrue(selectedTabLabel(frameDoc) === "info", "initial selected tab is info");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "settings", "ArrowRight selects settings");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "End", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "about", "End selects about");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "Home", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "info", "Home selects info");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        const timeoutMs = 20000;
        await checkMenuKeyboardOnly(frame, timeoutMs);
        await checkTabsKeyboardOnly(frame, timeoutMs);
        setStatus("PASS\nkeyboard contract: menu + tabs keyboard-only flow", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: body=" + JSON.stringify(bodyText(frameDoc).slice(0, 240)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
