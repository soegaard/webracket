<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser menu-icons smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running browser menu-icons smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-icons" title="web-easy menu-icons smoke app"></iframe>

  <script>
    function setStatus(text, cls) { const status = document.getElementById("status"); status.textContent = text; status.className = cls; }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertEqual(got, want, label) { if (got !== want) { throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got)); } }
    function assertTrue(v, label) { if (!v) { throw new Error(label + ": expected true, got false"); } }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const label = frameDoc.querySelector("[data-we-widget='menu-label']");
          const status = Array.from(frameDoc.querySelectorAll("[data-we-widget='text']"))
            .find((e) => e.textContent.trim().startsWith("status:"));
          if (label && status) {
            return { frameDoc, label, status };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for menu-icons smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        ui.label.click();
        await sleep(80);
        const leading = ui.frameDoc.querySelector(".we-menu-item-icon-leading[data-we-widget='menu-item-icon']");
        const trailing = ui.frameDoc.querySelector(".we-menu-item-icon-trailing[data-we-widget='menu-item-icon']");
        const saveItem = Array.from(ui.frameDoc.querySelectorAll("[data-we-widget='menu-item']"))
          .find((e) => e.textContent.trim().includes("Save"));
        assertTrue(!!leading, "menu item leading icon present");
        assertTrue(!!trailing, "menu item trailing icon present");
        saveItem.click();
        await sleep(100);
        assertEqual(ui.status.textContent.trim(), "status:save", "status after menu selection");
        setStatus("PASS\nmenu-item leading/trailing icon slots render", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
