<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity progress contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity progress contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-progress" title="web-easy parity progress contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const progress = frameDoc.querySelector("[data-we-widget='progress'].we-progress");
          const successButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-success");
          const errorButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-danger");
          if (progress && successButton && errorButton) {
            return { progress, successButton, errorButton };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity progress contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertTrue(ui.progress.className.includes("we-progress-info"), "initial parity progress variant class info");

        ui.successButton.click();
        await sleep(100);
        assertTrue(ui.progress.className.includes("we-progress-success"), "parity progress variant class after success");

        ui.errorButton.click();
        await sleep(100);
        assertTrue(ui.progress.className.includes("we-progress-danger"), "parity progress variant class after danger");

        setStatus("PASS\nparity progress contract: data-we-widget + variant class transitions", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
