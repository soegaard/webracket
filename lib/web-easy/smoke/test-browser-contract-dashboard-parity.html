<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity contract dashboard</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
      max-width: 1000px;
    }
    #summary {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #summary.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #summary.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #999;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    td.status-pass {
      color: #0a6a0a;
    }
    td.status-fail {
      color: #8a1111;
    }
  </style>
</head>
<body>
  <h1>web-easy parity contract dashboard</h1>
  <div id="summary">Running parity contract smoke pages...</div>
  <table id="results">
    <thead>
      <tr>
        <th>Test Page</th>
        <th>Status</th>
        <th>Message</th>
        <th>Duration (ms)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="./dashboard-guard.js"></script>
  <script>
        const tests = [
      "test-browser-parity-style-hook-contract.html",
      "test-browser-parity-a11y-contract.html",
      "test-browser-parity-keyboard-contract.html",
      "test-browser-parity-focus-order.html",
      "test-browser-parity-disabled-contract.html",
      "test-browser-parity-dialog-contract.html",
      "test-browser-parity-dialog-actions-contract.html",
      "test-browser-parity-popover-contract.html",
      "test-browser-parity-dropdown-contract.html",
      "test-browser-parity-dropdown-keyboard-deep.html",
      "test-browser-parity-choice-keyboard-deep.html",
      "test-browser-parity-choice-decode-contract.html",
      "test-browser-parity-navigation-bar-contract.html",
      "test-browser-parity-navigation-bar-orientation-contract.html",
      "test-browser-parity-navigation-bar-collapsed-contract.html",
      "test-browser-parity-navigation-bar-toggle-a11y-contract.html",
      "test-browser-parity-button-group-contract.html",
      "test-browser-parity-button-toolbar-contract.html",
      "test-browser-parity-card-contract.html",
      "test-browser-parity-alert-contract.html",
      "test-browser-parity-badge-contract.html",
      "test-browser-parity-spinner-contract.html",
      "test-browser-parity-pagination-contract.html",
      "test-browser-parity-breadcrumb-contract.html",
      "test-browser-parity-list-group-contract.html",
      "test-browser-parity-solar2-list-group-contract.html",
      "test-browser-parity-toast-contract.html",
      "test-browser-parity-toast-behavior-contract.html",
      "test-browser-parity-toast-timer-contract.html",
      "test-browser-parity-toast-hover-pause-contract.html",
      "test-browser-parity-collapse-contract.html",
      "test-browser-parity-accordion-contract.html",
      "test-browser-parity-offcanvas-contract.html",
      "test-browser-parity-modal-contract.html",
      "test-browser-parity-modal-close-reason-contract.html",
      "test-browser-parity-close-button-contract.html",
      "test-browser-parity-placeholder-contract.html",
      "test-browser-parity-headings-contract.html",
      "test-browser-parity-headings-style-contract.html",
      "test-browser-parity-carousel-contract.html",
      "test-browser-parity-carousel-wrap-contract.html",
      "test-browser-parity-carousel-keyboard-contract.html",
      "test-browser-parity-carousel-autoplay-contract.html",
      "test-browser-parity-carousel-autoplay-nowrap-contract.html",
      "test-browser-parity-scrollspy-contract.html",
      "test-browser-parity-scrollspy-keyboard-deep.html",
      "test-browser-parity-tooltip-contract.html",
      "test-browser-parity-menu-single-open-contract.html",
      "test-browser-parity-menu-roving-focus-contract.html",
      "test-browser-parity-menu-close-reason-contract.html",
      "test-browser-parity-dialog-close-reason-contract.html",
      "test-browser-parity-tab-close-style-contract.html",
      "test-browser-parity-menu-typeahead-contract.html",
      "test-browser-parity-menu-typeahead-timeout-contract.html",
      "test-browser-parity-menu-core-structure-contract.html",
      "test-browser-parity-dropdown-focus-return-contract.html",
      "test-browser-parity-tab-aria-linkage-contract.html",
      "test-browser-parity-tab-aria-dynamic-contract.html",
      "test-browser-parity-menu-aria-state-contract.html",
      "test-browser-parity-progress-contract.html",
      "test-browser-parity-table-align-contract.html",
      "test-browser-parity-dialog-no-desc-contract.html",
    ];

    const timeoutByPage = {
      "test-browser-parity-keyboard-contract.html": 25000,
      "test-browser-parity-style-hook-contract.html": 25000,
      "test-browser-parity-menu-typeahead-timeout-contract.html": 25000
    };


    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setSummary(text, cls) {
      const s = document.getElementById("summary");
      s.textContent = text;
      s.className = cls;
    }

    function appendRow(page, status, message, durationMs) {
      const tbody = document.querySelector("#results tbody");
      const tr = document.createElement("tr");

      const tdPage = document.createElement("td");
      const link = document.createElement("a");
      link.href = page;
      link.textContent = page;
      link.target = "_blank";
      tdPage.appendChild(link);

      const tdStatus = document.createElement("td");
      tdStatus.textContent = status;
      tdStatus.className = status === "PASS" ? "status-pass" : "status-fail";

      const tdMessage = document.createElement("td");
      tdMessage.textContent = message;

      const tdDuration = document.createElement("td");
      tdDuration.textContent = String(durationMs);

      tr.appendChild(tdPage);
      tr.appendChild(tdStatus);
      tr.appendChild(tdMessage);
      tr.appendChild(tdDuration);
      tbody.appendChild(tr);
    }

    async function teardownFrame(frame) {
      try {
        await new Promise((resolve) => {
          let done = false;
          const finish = () => {
            if (done) return;
            done = true;
            resolve();
          };
          const timer = setTimeout(finish, 1000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            finish();
          }, { once: true });
          frame.src = "about:blank";
        });
      } catch (_err) {
      } finally {
        frame.remove();
      }
    }

    async function runOne(page, timeoutMs) {
      const frame = document.createElement("iframe");
      frame.style.position = "absolute";
      frame.style.left = "-10000px";
      frame.style.top = "0";
      frame.style.width = "900px";
      frame.style.height = "700px";
      frame.style.border = "0";
      frame.src = page;
      document.body.appendChild(frame);

      const start = Date.now();

      while (Date.now() - start < timeoutMs) {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (doc) {
          const status = doc.getElementById("status");
          if (status) {
            const text = (status.textContent || "").trim();
            if (text.startsWith("PASS")) {
              const offenders = window.smokeDashboardGuard.findForbiddenAttrTokensRecursively(doc, page);
              if (offenders.length > 0) {
                await teardownFrame(frame);
                const samples = offenders.slice(0, 4).join("; ");
                return {
                  page,
                  ok: false,
                  message: "FAIL\nFound forbidden token in DOM attributes: " + samples,
                  durationMs: Date.now() - start
                };
              }
              const styleOffenders = window.smokeDashboardGuard.findInlineStyleAttrsOnWidgetsRecursively(doc, page);
              if (styleOffenders.length > 0) {
                await teardownFrame(frame);
                const samples = styleOffenders.slice(0, 4).join("; ");
                return {
                  page,
                  ok: false,
                  message: "FAIL\nFound inline style on data-we-widget node: " + samples,
                  durationMs: Date.now() - start
                };
              }
              await teardownFrame(frame);
              return { page, ok: true, message: text, durationMs: Date.now() - start };
            }
            if (text.startsWith("FAIL")) {
              await teardownFrame(frame);
              return { page, ok: false, message: text, durationMs: Date.now() - start };
            }
          }
        }
        await sleep(50);
      }

      await teardownFrame(frame);
      return {
        page,
        ok: false,
        message: "FAIL\nTimed out waiting for PASS/FAIL status",
        durationMs: Date.now() - start
      };
    }

    (async function runAll() {
      const results = [];
      window.__smokeCurrentPage = "";
      window.__smokeLastCompletedPage = "";
      for (const page of tests) {
        window.__smokeCurrentPage = page;
        const timeoutMs = timeoutByPage[page] || 15000;
        const result = await runOne(page, timeoutMs);
        window.__smokeLastCompletedPage = page;
        results.push(result);
        appendRow(page, result.ok ? "PASS" : "FAIL", result.message, result.durationMs);
        if (!result.ok) {
          const passedSoFar = results.filter((r) => r.ok).length;
          setSummary("FAIL\n" + passedSoFar + "/" + tests.length + " contract tests passed", "fail");
          return;
        }
      }

      const passed = results.filter((r) => r.ok).length;
      const total = results.length;
      if (passed === total) {
        setSummary("PASS\n" + passed + "/" + total + " contract tests passed", "pass");
      } else {
        setSummary("FAIL\n" + passed + "/" + total + " contract tests passed", "fail");
      }
      // Keep last page markers for external runner diagnostics.
    })();
  </script>
</body>
</html>
