<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy autofocus smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 220px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser autofocus assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=autofocus" title="web-easy autofocus smoke app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=autofocus",
          (d) => Array.from(d.querySelectorAll("button"))
            .some((b) => (b.textContent || "").trim() === "open-editor"),
          20000
        );

        const openButton = Array.from(doc.querySelectorAll("button"))
          .find((b) => (b.textContent || "").trim() === "open-editor");
        H.assertTrue(!!openButton, "open-editor button present");
        H.assertTrue(H.bodyText(doc).includes("status:idle"), "status idle before open");

        openButton.focus();
        openButton.click();

        await H.waitForCondition("autofocus editor mount", 20000, function () {
          return !!doc.getElementById("autofocus-editor");
        });

        const editor = doc.getElementById("autofocus-editor");
        H.assertTrue(!!editor, "autofocus editor mounted");

        await H.waitForCondition("autofocus active element", 20000, function () {
          return doc.activeElement === editor;
        });

        H.assertEqual(doc.activeElement, editor, "autofocus moves focus to mounted editor");

        const FrameKeyboardEvent = doc.defaultView.KeyboardEvent;
        editor.dispatchEvent(new FrameKeyboardEvent("keydown", { key: "Escape", bubbles: true }));

        await H.waitForCondition("autofocus escape close", 20000, function () {
          return H.bodyText(doc).includes("status:escape");
        });

        H.assertTrue(!doc.getElementById("autofocus-editor"), "editor closed after Escape");
        H.assertTrue(H.bodyText(doc).includes("status:escape"), "status after Escape");
        H.setStatus("PASS\nautofocus focuses dynamic editor and Escape closes immediately", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus(
          "FAIL\n" + (err && err.message ? err.message : String(err)),
          "fail"
        );
      }
    })();
  </script>
</body>
</html>
