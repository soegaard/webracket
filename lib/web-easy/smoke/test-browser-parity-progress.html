<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity progress smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity progress assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-progress" title="web-easy parity progress app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const progress = frameDoc.querySelector("progress");
          const successButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-success");
          const errorButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-danger");
          const stepButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "step");
          if (progress && successButton && errorButton && stepButton) {
            return { progress, successButton, errorButton, stepButton };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity progress UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.progress.getAttribute("value"), "30", "initial parity progress value");
        assertEqual(ui.progress.className.includes("we-progress-info"), true, "initial parity progress class info");

        ui.successButton.click();
        await sleep(100);
        assertEqual(ui.progress.className.includes("we-progress-success"), true, "parity progress class after success click");

        ui.stepButton.click();
        await sleep(100);
        assertEqual(ui.progress.getAttribute("value"), "40", "parity progress value after step click");

        ui.errorButton.click();
        await sleep(100);
        assertEqual(ui.progress.className.includes("we-progress-danger"), true, "parity progress class after danger click");

        setStatus("PASS\nparity progress value 30->40; variants info->success->danger", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
