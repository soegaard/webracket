<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity incident smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 360px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity incident assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-incident" title="web-easy parity incident app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuItemByText(frameDoc, label) {
      const buttons = Array.from(frameDoc.querySelectorAll("button"));
      const spans = Array.from(frameDoc.querySelectorAll("span"));
      return buttons.concat(spans)
        .find((el) => (el.textContent || "").trim() === label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const input = frameDoc.querySelector("input");
          const select = frameDoc.querySelector("select");
          const table = frameDoc.querySelector("table");
          const text = bodyText(frameDoc);
          if (input &&
              select &&
              table &&
              menuItemByText(frameDoc, "Assign Visible") &&
              text.includes("visible:3") &&
              text.includes("101:high:open:unassigned:DB outage") &&
              text.includes("102:medium:open:unassigned:Login latency")) {
            return { frameDoc, input, select };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity incident UI");
    }

    function setSelectValue(frameDoc, select, value) {
      const options = Array.from(select.options);
      const idx = options.findIndex((opt) => opt.value === value || opt.textContent.trim() === value);
      if (idx < 0) {
        throw new Error("select option missing: " + value);
      }
      select.selectedIndex = idx;
      select.dispatchEvent(new Event("change", { bubbles: true }));
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        let text = bodyText(ui.frameDoc);
        assertTrue(text.includes("visible:3"), "initial visible count");

        setSelectValue(ui.frameDoc, ui.select, "high");
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("visible:1"), "visible count after high filter");
        assertTrue(text.includes("101:high:open:unassigned:DB outage"), "high filter keeps 101");
        assertTrue(!text.includes("102:medium:open:unassigned:Login latency"), "high filter hides 102");

        setSelectValue(ui.frameDoc, ui.select, "all");
        ui.input.value = "Login";
        ui.input.dispatchEvent(new Event("input", { bubbles: true }));
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("visible:1"), "visible count after query");
        assertTrue(text.includes("102:medium:open:unassigned:Login latency"), "query matches login incident");

        menuItemByText(ui.frameDoc, "Assign Visible").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("102:medium:open:me:Login latency"), "assign visible updates owner");
        assertTrue(text.includes("status:assigned:102"), "status after assign");

        menuItemByText(ui.frameDoc, "Resolve Visible")
          .dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("102:medium:resolved:me:Login latency"), "resolve visible updates state");
        assertTrue(text.includes("status:resolved:102"), "status after resolve");
        assertTrue(text.includes("resolved:1"), "resolved summary count");

        menuItemByText(ui.frameDoc, "Reset Triage").click();
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("visible:3"), "visible count after reset");
        assertTrue(text.includes("status:reset"), "status after reset");
        assertTrue(text.includes("102:medium:open:unassigned:Login latency"), "reset restores incident");

        setStatus("PASS\nincident parity: filter + query + assign/resolve/reset", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: inputs=" + frameDoc.querySelectorAll("input").length +
             " selects=" + frameDoc.querySelectorAll("select").length +
             " tables=" + frameDoc.querySelectorAll("table").length +
             " body=" + JSON.stringify(bodyText(frameDoc)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
