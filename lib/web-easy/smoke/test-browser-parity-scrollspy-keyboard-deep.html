<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity scrollspy keyboard deep contract</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running deep parity scrollspy keyboard contract...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-scrollspy"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }

    function itemByLabel(doc, label) {
      return Array.from(doc.querySelectorAll("[data-we-widget='scrollspy-item']"))
        .find((n) => (n.textContent || "").trim() === label);
    }

    function currentText(doc) {
      const node = Array.from(doc.querySelectorAll("[data-we-widget='text']"))
        .find((n) => (n.textContent || "").trim().startsWith("parity-current:"));
      return node ? (node.textContent || "").trim() : "";
    }

    async function waitForCondition(label, timeoutMs, pred) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (pred()) return;
        await sleep(25);
      }
      throw new Error("Timed out waiting for " + label);
    }

    function dispatchKey(el, key) {
      el.dispatchEvent(new KeyboardEvent("keydown", { key, bubbles: true }));
    }

    (async () => {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const doc = frameDocFrom(frame);
        await waitForCondition("scrollspy nodes", 3000, () => !!itemByLabel(doc, "Docs"));

        itemByLabel(doc, "Docs").click();
        await waitForCondition("baseline parity-current=docs", 2000, () => currentText(doc) === "parity-current:docs");

        itemByLabel(doc, "Docs").focus();
        dispatchKey(itemByLabel(doc, "Docs"), "ArrowRight");
        await waitForCondition("docs -> faq", 2000, () => currentText(doc) === "parity-current:faq");

        itemByLabel(doc, "FAQ").focus();
        dispatchKey(itemByLabel(doc, "FAQ"), "Home");
        await waitForCondition("faq -> home (Home key)", 2000, () => currentText(doc) === "parity-current:home");

        setStatus("PASS\nparity scrollspy deep keyboard: docs->faq and Home->home", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
