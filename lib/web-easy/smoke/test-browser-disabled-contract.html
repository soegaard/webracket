<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy disabled contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running disabled contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tab-panel-disabled" title="web-easy disabled contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    function tabByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('button[role="tab"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function selectedLabel(frameDoc) {
      const selected = frameDoc.querySelector('button[role="tab"][aria-selected="true"]');
      return selected ? (selected.textContent || "").trim() : "";
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const left = tabByText(frameDoc, "left");
          const middle = tabByText(frameDoc, "middle");
          const right = tabByText(frameDoc, "right");
          if (left && middle && right) {
            return { frameDoc, left, middle, right };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for disabled contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(selectedLabel(ui.frameDoc), "left", "initial selected tab");
        assertEqual(ui.middle.getAttribute("aria-disabled"), "true", "middle aria-disabled");
        assertTrue((ui.middle.className || "").includes("is-disabled"), "middle disabled class");
        assertEqual(ui.middle.getAttribute("tabindex"), "-1", "middle tabindex");

        ui.middle.click();
        await sleep(60);
        assertEqual(selectedLabel(ui.frameDoc), "left", "disabled click does not select middle");

        ui.left.focus();
        await sleep(40);
        ui.left.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
        await sleep(60);
        assertEqual(selectedLabel(ui.frameDoc), "right", "ArrowRight skips disabled middle");

        ui.right.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowLeft", bubbles: true }));
        await sleep(60);
        assertEqual(selectedLabel(ui.frameDoc), "left", "ArrowLeft skips disabled middle");

        ui.left.dispatchEvent(new KeyboardEvent("keydown", { key: "End", bubbles: true }));
        await sleep(60);
        assertEqual(selectedLabel(ui.frameDoc), "right", "End selects last enabled");

        ui.right.dispatchEvent(new KeyboardEvent("keydown", { key: "Home", bubbles: true }));
        await sleep(60);
        assertEqual(selectedLabel(ui.frameDoc), "left", "Home selects first enabled");

        setStatus("PASS\ndisabled contract: disabled tab is non-activating and skipped", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
