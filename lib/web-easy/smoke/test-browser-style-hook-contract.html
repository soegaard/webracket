<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy style hook contract test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 420px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running style hook contract assertions...</div>
  <iframe id="app-frame" src="about:blank" title="web-easy style hook contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    function assertHook(frameDoc, selector, label) {
      assertTrue(!!frameDoc.querySelector(selector), label + " hook present: " + selector);
    }

    function checkControlsHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='choice'].we-choice", "controls");
      assertHook(frameDoc, "[data-we-widget='slider'].we-slider", "controls");
      assertHook(frameDoc, "[data-we-widget='progress'].we-progress", "controls");
    }

    function checkProgressVariantHooks(frameDoc) {
      const progress = frameDoc.querySelector("[data-we-widget='progress'].we-progress");
      const warnBtn = Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => b.textContent.trim() === "warn");
      const errorBtn = Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => b.textContent.trim() === "error");
      assertTrue(!!progress, "progress variant hook progress node present");
      assertTrue(!!warnBtn, "progress variant hook warn button present");
      assertTrue(!!errorBtn, "progress variant hook error button present");

      warnBtn.click();
      assertTrue(progress.className.includes("we-progress-warn"), "progress variant hook warn class");
      errorBtn.click();
      assertTrue(progress.className.includes("we-progress-error"), "progress variant hook error class");
    }

    function checkGroupTableHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='group'].we-group", "group");
      assertHook(frameDoc, "[data-we-widget='input'].we-input", "input");
      assertHook(frameDoc, "[data-we-widget='checkbox'].we-checkbox", "checkbox");
      assertHook(frameDoc, "[data-we-widget='table'].we-table", "table");
      assertHook(frameDoc, "[data-we-widget='table-header-cell'].we-table-header-cell", "table header");
      assertHook(frameDoc, "[data-we-widget='table-data-cell'].we-table-data-cell", "table data");
    }

    function checkMenuHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='menu-bar'].we-menu-bar", "menu bar");
      assertHook(frameDoc, "[data-we-widget='menu'].we-menu", "menu");
      assertHook(frameDoc, "[data-we-widget='menu-label'].we-menu-label", "menu label");
      assertHook(frameDoc, "[data-we-widget='menu-popup'].we-menu-popup", "menu popup");
      assertHook(frameDoc, "[data-we-widget='menu-item'].we-menu-item", "menu item");
    }

    function checkMenuStateHooks(frameDoc) {
      const label = frameDoc.querySelector("[data-we-widget='menu-label'].we-menu-label");
      const popup = frameDoc.querySelector("[data-we-widget='menu-popup'].we-menu-popup");
      assertTrue(!!label, "menu state label present");
      assertTrue(!!popup, "menu state popup present");

      label.click();
      assertTrue(label.getAttribute("aria-expanded") === "true", "menu label aria-expanded true after click");
      assertTrue(popup.className.includes("is-open"), "menu popup has is-open class after click");

      label.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
      assertTrue(label.getAttribute("aria-expanded") === "false", "menu label aria-expanded false after Escape");
      assertTrue(!popup.className.includes("is-open"), "menu popup closes after Escape");
    }

    function checkTabHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='tab-panel'].we-tab-panel", "tab panel");
      assertHook(frameDoc, "[data-we-widget='tab-list'].we-tab-list", "tab list");
      assertHook(frameDoc, "[data-we-widget='tab-button'].we-tab-btn", "tab button");
      assertHook(frameDoc, "[data-we-widget='tab-content'].we-tab-content", "tab content");
    }

    function checkDialogHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='dialog'].we-dialog", "dialog");
      assertHook(frameDoc, "[data-we-widget='dialog-panel'].we-dialog-panel", "dialog panel");
    }

    function checkProfileHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='radios'].we-radios", "radios");
      assertHook(frameDoc, "[data-we-widget='image'].we-image", "image");
      assertHook(frameDoc, "[data-we-widget='menu-bar'].we-menu-bar", "profile menu bar");
    }

    function checkTooltipHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='tooltip'].we-tooltip", "tooltip");
      assertHook(frameDoc, "[data-we-widget='tooltip-trigger'].we-tooltip-trigger", "tooltip trigger");
      assertHook(frameDoc, "[data-we-widget='tooltip-bubble'].we-tooltip-bubble", "tooltip bubble");
    }

    function checkPopoverHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='popover'].we-popover", "popover");
      assertHook(frameDoc, "[data-we-widget='popover-trigger'].we-popover-trigger", "popover trigger");
      assertHook(frameDoc, "[data-we-widget='popover-backdrop'].we-popover-backdrop", "popover backdrop");
      assertHook(frameDoc, "[data-we-widget='popover-panel'].we-popover-panel", "popover panel");
    }

    function checkAlertHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='alert'].we-alert", "alert");
    }

    function checkBadgeHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='badge'].we-badge", "badge");
    }

    function checkSpinnerHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='spinner'].we-spinner", "spinner");
    }

    function checkPaginationHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='pagination'].we-pagination", "pagination");
      assertHook(frameDoc, "[data-we-widget='page-button'].we-page-btn", "page button");
    }

    function checkBreadcrumbHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='breadcrumb'].we-breadcrumb", "breadcrumb");
      assertHook(frameDoc, "[data-we-widget='breadcrumb-item'].we-breadcrumb-item", "breadcrumb item");
    }

    function checkListGroupHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='list-group'].we-list-group", "list-group");
      assertHook(frameDoc, "[data-we-widget='list-group-item'].we-list-group-item", "list-group item");
    }

    function checkToastHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='toast'].we-toast", "toast");
    }

    function checkCollapseHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='collapse'].we-collapse", "collapse");
    }

    function checkAccordionHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='accordion'].we-accordion", "accordion");
      assertHook(frameDoc, "[data-we-widget='accordion-trigger'].we-accordion-trigger", "accordion trigger");
    }

    function checkOffcanvasHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='offcanvas'].we-offcanvas", "offcanvas");
      assertHook(frameDoc, "[data-we-widget='offcanvas-panel'].we-offcanvas-panel", "offcanvas panel");
      assertHook(frameDoc, "[data-we-widget='offcanvas-backdrop'].we-offcanvas-backdrop", "offcanvas backdrop");
      assertHook(frameDoc, "[data-we-widget='close-button'].we-close-button", "offcanvas close button");
    }

    function checkCloseButtonHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='close-button'].we-close-button", "close-button");
      assertHook(frameDoc, "[data-we-widget='close-button-icon'].we-close-button-icon", "close-button icon");
    }

    function checkPlaceholderHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='placeholder'].we-placeholder", "placeholder");
    }

    function checkCarouselHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='carousel'].we-carousel", "carousel");
      assertHook(frameDoc, "[data-we-widget='carousel-viewport'].we-carousel-viewport", "carousel viewport");
      assertHook(frameDoc, "[data-we-widget='carousel-indicator'].we-carousel-indicator", "carousel indicator");
    }

    function checkScrollspyHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='scrollspy'].we-scrollspy", "scrollspy");
      assertHook(frameDoc, "[data-we-widget='scrollspy-nav'].we-scrollspy-nav", "scrollspy nav");
      assertHook(frameDoc, "[data-we-widget='scrollspy-sections'].we-scrollspy-sections", "scrollspy sections");
      assertHook(frameDoc, "[data-we-widget='scrollspy-section'].we-scrollspy-section", "scrollspy section");
      assertHook(frameDoc, "[data-we-widget='scrollspy-item'].we-scrollspy-item", "scrollspy item");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        const timeoutMs = 20000;

        const controlsDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=controls",
          (d) => d.querySelector("[data-we-widget='choice']"),
          timeoutMs
        );
        checkControlsHooks(controlsDoc);

        const progressDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=progress",
          (d) => d.querySelector("[data-we-widget='progress']"),
          timeoutMs
        );
        checkProgressVariantHooks(progressDoc);

        const groupDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=width",
          (d) => d.querySelector("[data-we-widget='table-data-cell']"),
          timeoutMs
        );
        checkGroupTableHooks(groupDoc);

        const menuDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=menu-full",
          (d) => d.querySelector("[data-we-widget='menu-item']"),
          timeoutMs
        );
        checkMenuHooks(menuDoc);
        checkMenuStateHooks(menuDoc);

        const tabDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=tab-panel",
          (d) => d.querySelector("[data-we-widget='tab-button']"),
          timeoutMs
        );
        checkTabHooks(tabDoc);

        const dialogDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=dialog",
          (d) => d.querySelector("[data-we-widget='dialog-panel']"),
          timeoutMs
        );
        checkDialogHooks(dialogDoc);

        const profileDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-profile",
          (d) => d.querySelector("[data-we-widget='image']"),
          timeoutMs
        );
        checkProfileHooks(profileDoc);

        const tooltipDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=tooltip",
          (d) => d.querySelector("[data-we-widget='tooltip-bubble']"),
          timeoutMs
        );
        checkTooltipHooks(tooltipDoc);

        const popoverDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=popover",
          (d) => d.querySelector("[data-we-widget='popover-panel']"),
          timeoutMs
        );
        checkPopoverHooks(popoverDoc);

        const alertDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=alert",
          (d) => d.querySelector("[data-we-widget='alert']"),
          timeoutMs
        );
        checkAlertHooks(alertDoc);

        const badgeDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=badge",
          (d) => d.querySelector("[data-we-widget='badge']"),
          timeoutMs
        );
        checkBadgeHooks(badgeDoc);

        const spinnerDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=spinner",
          (d) => d.querySelector("[data-we-widget='spinner']"),
          timeoutMs
        );
        checkSpinnerHooks(spinnerDoc);

        const paginationDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=pagination",
          (d) => d.querySelector("[data-we-widget='page-button']"),
          timeoutMs
        );
        checkPaginationHooks(paginationDoc);

        const breadcrumbDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=breadcrumb",
          (d) => d.querySelector("[data-we-widget='breadcrumb-item']"),
          timeoutMs
        );
        checkBreadcrumbHooks(breadcrumbDoc);

        const listGroupDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=list-group",
          (d) => d.querySelector("[data-we-widget='list-group-item']"),
          timeoutMs
        );
        checkListGroupHooks(listGroupDoc);

        const toastDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=toast",
          (d) => d.querySelector("[data-we-widget='toast']"),
          timeoutMs
        );
        checkToastHooks(toastDoc);

        const collapseDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=collapse",
          (d) => d.querySelector("[data-we-widget='collapse']"),
          timeoutMs
        );
        checkCollapseHooks(collapseDoc);

        const accordionDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=accordion",
          (d) => d.querySelector("[data-we-widget='accordion-trigger']"),
          timeoutMs
        );
        checkAccordionHooks(accordionDoc);

        const offcanvasDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=offcanvas",
          (d) => d.querySelector("[data-we-widget='offcanvas-panel']"),
          timeoutMs
        );
        checkOffcanvasHooks(offcanvasDoc);

        const closeButtonDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=close-button",
          (d) => d.querySelector("[data-we-widget='close-button']"),
          timeoutMs
        );
        checkCloseButtonHooks(closeButtonDoc);

        const placeholderDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=placeholder",
          (d) => d.querySelector("[data-we-widget='placeholder']"),
          timeoutMs
        );
        checkPlaceholderHooks(placeholderDoc);

        const carouselDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=carousel",
          (d) => d.querySelector("[data-we-widget='carousel-indicator']"),
          timeoutMs
        );
        checkCarouselHooks(carouselDoc);

        const scrollspyDoc = await loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=scrollspy",
          (d) => d.querySelector("[data-we-widget='scrollspy-item']"),
          timeoutMs
        );
        checkScrollspyHooks(scrollspyDoc);

        setStatus("PASS\nstyle hook contract: class + data-we-widget markers stable", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
