<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity counters smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity counters assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-counters" title="web-easy parity counters app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const buttons = frameDoc.querySelectorAll("button");
          const text = bodyText(frameDoc);
          if (buttons.length >= 4 && text.includes("c1:0") && text.includes("c2:0")) {
            return { frameDoc };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity counters UI");
    }

    function buttonByIndex(frameDoc, i) {
      return Array.from(frameDoc.querySelectorAll("button"))[i];
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        let text = bodyText(ui.frameDoc);
        assertTrue(text.includes("c1:0") && text.includes("c2:0"), "initial counters at 0");

        buttonByIndex(ui.frameDoc, 0).click();
        await sleep(80);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("c1:1") && text.includes("c2:0"), "after c1 + => c1:1 c2:0");

        buttonByIndex(ui.frameDoc, 2).click();
        buttonByIndex(ui.frameDoc, 2).click();
        await sleep(80);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("c1:1") && text.includes("c2:2"), "after c2 ++ => c1:1 c2:2");

        buttonByIndex(ui.frameDoc, 1).click();
        await sleep(80);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("c1:0") && text.includes("c2:2"), "after c1 - => c1:0 c2:2");

        setStatus("PASS\nindependent counters: c1 0->1->0, c2 0->2", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
