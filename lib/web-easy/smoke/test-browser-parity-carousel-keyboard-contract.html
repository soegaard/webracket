<body><div id="status">Running parity carousel keyboard contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-carousel-advanced"></iframe><script src="./smoke-harness.js"></script><script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-parity-all.html?test=parity-carousel-advanced",(d)=>!!d.querySelector("[data-we-widget='carousel']"),2e4);const carousel=doc.querySelector("[data-we-widget='carousel']");const indexText=()=>Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((n)=>(n.textContent||"").trim().startsWith("parity-index:"));carousel.focus();H.dispatchKey(carousel,"ArrowRight");await H.sleep(80);H.assertEqual((indexText().textContent||"").trim(),"parity-index:1","parity ArrowRight increments");H.dispatchKey(carousel,"Home");await H.sleep(80);H.assertEqual((indexText().textContent||"").trim(),"parity-index:0","parity Home sets first");H.dispatchKey(carousel,"End");await H.sleep(80);H.assertEqual((indexText().textContent||"").trim(),"parity-index:2","parity End sets last");H.setStatus("PASS\nparity carousel keyboard contract: arrows/home/end", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
