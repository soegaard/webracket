<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser progress smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser progress smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=progress" title="web-easy progress smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const progress = frameDoc.querySelector("progress");
          const warnButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "warn");
          const errorButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "error");
          const incButton = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "inc");
          if (progress && warnButton && errorButton && incButton) {
            return { frameDoc, progress, warnButton, errorButton, incButton };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for progress smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.progress.getAttribute("value"), "25", "initial progress value");
        assertEqual(ui.progress.className.includes("we-progress-info"), true, "initial progress class info");

        ui.warnButton.click();
        await sleep(100);
        assertEqual(ui.progress.className.includes("we-progress-warn"), true, "progress class after warn click");

        ui.incButton.click();
        await sleep(100);
        assertEqual(ui.progress.getAttribute("value"), "30", "progress value after inc click");

        ui.errorButton.click();
        await sleep(100);
        assertEqual(ui.progress.className.includes("we-progress-error"), true, "progress class after error click");

        setStatus("PASS\nprogress value 25->30; variants info->warn->error", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
