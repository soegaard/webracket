<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity dropdown contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity dropdown contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-dropdown" title="web-easy parity dropdown contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function dispatchKey(el, key) {
      el.dispatchEvent(new KeyboardEvent("keydown", { key, bubbles: true }));
    }

    function pseudoContent(win, el, pseudo) {
      return win.getComputedStyle(el, pseudo).content || "";
    }

    async function waitForCondition(label, timeoutMs, pred) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (pred()) return;
        await sleep(25);
      }
      throw new Error("Timed out waiting for " + label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const trigger = frameDoc.querySelector("[data-we-widget='menu-label']");
          const popup = frameDoc.querySelector("[data-we-widget='menu-popup']");
          const deployItem = Array.from(frameDoc.querySelectorAll("[data-we-widget='menu-item']"))
            .find((e) => e.textContent.trim() === "Deploy");
          const selectedText = frameDoc.querySelector("[data-we-widget='text']");
          if (trigger && popup && deployItem && selectedText) {
            return { trigger, popup, deployItem, selectedText };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity dropdown contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const frameWin = frame.contentWindow;

        assertEqual(ui.trigger.getAttribute("aria-expanded"), "false", "parity dropdown aria-expanded initial");
        assertEqual(ui.trigger.getAttribute("aria-haspopup"), "menu", "parity dropdown aria-haspopup");
        assertEqual(ui.popup.getAttribute("class"), "we-menu-popup", "parity dropdown popup class initial");

        const marker = pseudoContent(frameWin, ui.trigger, "::after");
        assertTrue(marker.includes("▾"), "parity dropdown indicator glyph is present");

        dispatchKey(ui.trigger, "ArrowDown");
        await sleep(100);
        assertEqual(ui.trigger.getAttribute("aria-expanded"), "true", "parity dropdown opens with ArrowDown");

        ui.deployItem.click();
        await sleep(120);
        assertEqual(ui.selectedText.textContent.trim(), "parity-selected:deploy", "parity dropdown action selection updates text");
        assertEqual(ui.trigger.getAttribute("aria-expanded"), "false", "parity dropdown closes after item activation");

        dispatchKey(ui.trigger, "Enter");
        await sleep(100);
        assertEqual(ui.trigger.getAttribute("aria-expanded"), "true", "parity dropdown opens with Enter");

        dispatchKey(ui.trigger, "Escape");
        await sleep(100);
        assertEqual(ui.trigger.getAttribute("aria-expanded"), "false", "parity dropdown closes with Escape");

        setStatus("PASS\nparity dropdown contract: indicator + open/close + ArrowDown + activation", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
