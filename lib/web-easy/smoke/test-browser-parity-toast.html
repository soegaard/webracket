<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity toast smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:280px;border:1px solid #999}</style></head>
<body><div id="status">Running parity toast smoke assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-toast" title="web-easy parity toast app"></iframe><script>
function setStatus(t,c){const s=document.getElementById("status");s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));} function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+": expected "+JSON.stringify(w)+", got "+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now();while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame);if(d){const toast=d.querySelector("[data-we-widget='toast']");const close=d.querySelector("[data-we-widget='toast-close']");const showLocked=Array.from(d.querySelectorAll("button")).find((b)=>b.textContent.trim()==="show-locked");if(toast&&close&&showLocked)return{d,toast,close,showLocked};}await sleep(25);}throw new Error("Timed out waiting for parity toast smoke UI");}
(async function run(){try{const frame=document.getElementById("app-frame");await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error("Timed out loading iframe")),20000);frame.addEventListener("load",()=>{clearTimeout(t);res();},{once:true});});const ui=await waitForUI(frame,20000);assertEqual(ui.toast.getAttribute("class"),"we-toast we-toast-success is-open","parity initial toast class");ui.close.click();await sleep(100);assertEqual(ui.toast.getAttribute("aria-hidden"),"true","parity toast hidden after close");ui.showLocked.click();await sleep(100);const closeAfter=ui.d.querySelector("[data-we-widget='toast-close']");assertEqual(closeAfter,null,"parity toast close hidden when non-dismissible");setStatus("PASS\nparity toast dismissible + severity behavior","pass");}catch(err){console.error(err);setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
