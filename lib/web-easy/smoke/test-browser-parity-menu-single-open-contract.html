<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity menu single-open contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity menu single-open contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-menu-full" title="web-easy parity menu single-open contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuLabelByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function expandedLabels(frameDoc) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .filter((el) => el.getAttribute("aria-expanded") === "true");
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const projectLabel = menuLabelByText(frameDoc, "Project");
          const helpLabel = menuLabelByText(frameDoc, "Help");
          if (projectLabel && helpLabel) {
            return { frameDoc, projectLabel, helpLabel };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity menu single-open contract UI");
    }

    function assertSingleOpen(frameDoc, expectedLabel, label) {
      const expanded = expandedLabels(frameDoc);
      assertTrue(expanded.length === 1, label + " expanded label count");
      assertTrue((expanded[0].textContent || "").trim() === expectedLabel, label + " expanded label");
      assertTrue(
        Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
          .filter((el) => el !== expanded[0])
          .every((el) => el.getAttribute("aria-expanded") === "false"),
        label + " non-selected labels collapsed"
      );
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const { frameDoc, projectLabel, helpLabel } = ui;

        assertTrue(expandedLabels(frameDoc).length === 0, "parity initially no expanded labels");

        projectLabel.click();
        await sleep(60);
        assertSingleOpen(frameDoc, "Project", "parity after Project click");

        projectLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
        await sleep(60);
        assertSingleOpen(frameDoc, "Help", "parity after ArrowRight switch");
        assertTrue(frameDoc.activeElement === helpLabel, "parity ArrowRight moves focus to Help label");

        helpLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowLeft", bubbles: true }));
        await sleep(60);
        assertSingleOpen(frameDoc, "Project", "parity after ArrowLeft switch");
        assertTrue(frameDoc.activeElement === projectLabel, "parity ArrowLeft moves focus to Project label");

        helpLabel.dispatchEvent(new MouseEvent("mouseenter", { bubbles: true }));
        await sleep(60);
        assertSingleOpen(frameDoc, "Help", "parity after hover switch");

        helpLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(60);
        assertTrue(expandedLabels(frameDoc).length === 0, "parity Escape clears expanded labels");

        setStatus("PASS\nparity menu single-open contract: exactly one open menu at a time", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: expanded=" + expandedLabels(frameDoc).length +
             " body=" + JSON.stringify(bodyText(frameDoc).slice(0, 240)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
