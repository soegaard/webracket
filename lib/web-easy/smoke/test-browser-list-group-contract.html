<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy list-group contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:240px;border:1px solid #999}</style></head>
<body><div id="status">Running list-group contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=list-group" title="web-easy list-group contract app"></iframe>
<script>
function setStatus(t,c){const s=document.getElementById("status");s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+": expected "+JSON.stringify(w)+", got "+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now(); while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame); if(d){const root=d.querySelector("[data-we-widget='list-group']"); const items=d.querySelectorAll("[data-we-widget='list-group-item']"); if(root&&items.length===3)return{d,root,items};} await sleep(25);} throw new Error("Timed out waiting for list-group contract UI");}
(async function run(){try{const frame=document.getElementById("app-frame"); await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error("Timed out loading iframe")),20000); frame.addEventListener("load",()=>{clearTimeout(t);res();},{once:true});}); const ui=await waitForUI(frame,20000);
assertEqual(String(ui.items.length),"3","item count"); const alpha=Array.from(ui.items).find((e)=>e.textContent.trim()==="Alpha"); alpha.click(); await sleep(100); const alphaAfter=Array.from(ui.d.querySelectorAll("[data-we-widget='list-group-item']")).find((e)=>e.textContent.trim()==="Alpha"); assertEqual(alphaAfter.getAttribute("class"),"we-list-group-item is-current","alpha class after click"); setStatus("PASS\nlist-group contract: item count + current class transition","pass");}catch(err){console.error(err); setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
