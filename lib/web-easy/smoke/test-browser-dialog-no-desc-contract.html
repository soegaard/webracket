<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy dialog-no-desc contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running dialog-no-desc contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=dialog-no-desc" title="web-easy dialog-no-desc contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=dialog-no-desc",
          (d) => Array.from(d.querySelectorAll("button")).some((b) => (b.textContent || "").trim() === "open-dialog"),
          20000
        );

        H.assertNoForbiddenAttrTokens(doc, "dialog-no-desc");
        H.assertNoInlineWidgetStyles(doc, "dialog-no-desc");

        const openBtn = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "open-dialog");
        openBtn.click();
        await H.waitForCondition("dialog open", 4000, () => {
          const dlg = doc.querySelector("[data-we-widget='dialog']");
          return dlg && dlg.getAttribute("aria-hidden") === "false";
        });

        const dlg = doc.querySelector("[data-we-widget='dialog']");
        const panel = doc.querySelector("[data-we-widget='dialog-panel']");
        H.assertTrue(!!dlg, "dialog root exists");
        H.assertTrue(!!panel, "dialog panel exists");
        H.assertTrue(!panel.hasAttribute("aria-describedby"), "aria-describedby omitted when no text body child");

        const cancel = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "cancel");
        cancel.click();
        await H.sleep(120);

        const status = Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((e) => (e.textContent || "").trim().startsWith("status:"));
        H.assertEqual((status.textContent || "").trim(), "status:cancel", "cancel status");

        H.setStatus("PASS\ndialog-no-desc contract: no aria-describedby when no descriptive text", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
