<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity modal contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:320px;border:1px solid #999}</style></head>
<body>
<div id="status">Running parity modal contract assertions...</div>
<iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-modal" title="web-easy parity modal contract app"></iframe>
<script src="./smoke-harness.js"></script>
<script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-parity-all.html?test=parity-modal",(d)=>!!d.querySelector("[data-we-widget='modal']"),2e4);H.assertNoForbiddenAttrTokens(doc,"parity-modal-contract");H.assertNoInlineWidgetStyles(doc,"parity-modal-contract");const open=Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="open-modal");const modal=doc.querySelector("[data-we-widget='modal']");H.assertEqual(modal.getAttribute("aria-hidden"),"true","parity modal initially hidden");open.click();await H.sleep(80);H.assertEqual(modal.getAttribute("aria-hidden"),"false","parity modal visible after open");H.assertEqual(modal.getAttribute("aria-modal"),"true","parity modal aria-modal true");H.dispatchKey(modal,"Escape");await H.sleep(80);H.assertEqual(modal.getAttribute("aria-hidden"),"true","parity modal hidden after Escape");H.setStatus("PASS\nparity modal contract: widget/aria/open-close", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script>
</body>
</html>
