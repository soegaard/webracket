<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity modal contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity modal contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-dialog" title="web-easy parity modal contract app"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertTrue(v, label) { if (!v) throw new Error(label + ": expected true, got false"); }

    function buttonByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => (b.textContent || "").trim() === label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const openButton = buttonByText(frameDoc, "open-dialog");
          const modal = frameDoc.querySelector(".we-dialog[role='dialog']");
          if (openButton && modal) {
            return { frameDoc, openButton, modal };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity modal contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertTrue(ui.modal.getAttribute("aria-hidden") === "true", "parity modal initially hidden");

        ui.openButton.click();
        await sleep(80);

        assertTrue(ui.modal.getAttribute("aria-hidden") === "false", "parity modal visible after open");
        assertTrue(ui.modal.getAttribute("aria-modal") === "true", "parity modal aria-modal true");

        ui.modal.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(80);

        assertTrue(ui.modal.getAttribute("aria-hidden") === "true", "parity modal hidden after Escape");
        setStatus("PASS\nparity modal contract: open/escape visibility + aria-modal", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
