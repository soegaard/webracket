<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy button-icons contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running button-icons contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=button-icons" title="web-easy button-icons contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=button-icons", (d) => d.querySelectorAll("[data-we-widget='button']").length >= 2, 20000);
        H.assertNoForbiddenAttrTokens(doc, "button-icons-contract");
        H.assertNoInlineWidgetStyles(doc, "button-icons-contract");
        const buttons = Array.from(doc.querySelectorAll("[data-we-widget='button']"));
        const plain = buttons.find((b) => (b.textContent || "").trim() === "plain");
        const icon = buttons.find((b) => (b.textContent || "").trim().includes("apply"));
        const count = Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((e) => (e.textContent || "").trim().startsWith("count:"));
        const plainCount = Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((e) => (e.textContent || "").trim().startsWith("plain:"));
        const leading = icon.querySelector(".we-button-icon-leading[data-we-widget='button-icon']");
        const trailing = icon.querySelector(".we-button-icon-trailing[data-we-widget='button-icon']");
        H.assertTrue(!!leading && !!trailing, "icon button exposes leading and trailing slots");
        H.assertEqual(plain.querySelectorAll("[data-we-widget='button-icon']").length, 0, "plain button has no icon slots");
        icon.click();
        plain.click();
        await H.sleep(100);
        H.assertEqual((count.textContent || "").trim(), "count:1", "icon button updates count");
        H.assertEqual((plainCount.textContent || "").trim(), "plain:1", "plain button updates plain count");
        H.setStatus("PASS\nbutton-icons contract: icon slots + plain fallback behavior", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
