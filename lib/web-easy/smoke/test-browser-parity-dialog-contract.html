<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity dialog contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity dialog contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-dialog" title="web-easy parity dialog contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function buttonByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => (b.textContent || "").trim() === label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const openButton = buttonByText(frameDoc, "open-dialog");
          const dialog = frameDoc.querySelector(".we-dialog[role='dialog']");
          if (openButton && dialog) {
            return { frameDoc, openButton, dialog };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity dialog contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const dlg = ui.dialog;

        assertTrue(dlg.getAttribute("role") === "dialog", "parity dialog role present");
        assertTrue(dlg.getAttribute("aria-modal") === "true", "parity dialog aria-modal true");
        assertTrue(dlg.getAttribute("aria-hidden") === "true", "parity dialog initially hidden");

        ui.openButton.focus();
        ui.openButton.click();
        await sleep(80);

        const cancelButton = buttonByText(ui.frameDoc, "cancel");
        assertTrue(!!cancelButton, "parity cancel button exists");
        assertTrue(dlg.getAttribute("aria-hidden") === "false", "parity dialog visible after open");
        assertTrue(ui.frameDoc.activeElement === cancelButton, "parity initial focus is in dialog");

        dlg.dispatchEvent(new KeyboardEvent("keydown", { key: "Tab", bubbles: true }));
        await sleep(40);
        assertTrue(ui.frameDoc.activeElement === cancelButton, "parity Tab focus trap in dialog");

        dlg.dispatchEvent(new KeyboardEvent("keydown", { key: "Tab", shiftKey: true, bubbles: true }));
        await sleep(40);
        assertTrue(ui.frameDoc.activeElement === cancelButton, "parity Shift+Tab focus trap in dialog");

        dlg.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(80);
        assertTrue(dlg.getAttribute("aria-hidden") === "true", "parity dialog hidden after Escape");
        assertTrue(ui.frameDoc.activeElement === ui.openButton, "parity focus returns to trigger after Escape");

        setStatus("PASS\nparity dialog contract: role/aria + focus trap + Escape focus return", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: body=" + JSON.stringify(bodyText(frameDoc).slice(0, 240)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
