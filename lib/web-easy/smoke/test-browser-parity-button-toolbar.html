<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity button-toolbar smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 240px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity button-toolbar smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-button-toolbar" title="web-easy parity button-toolbar app"></iframe>
  <script>
    function setStatus(text, cls) { const status = document.getElementById("status"); status.textContent = text; status.className = cls; }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertEqual(got, want, label) { if (got !== want) throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got)); }
    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const toolbar = frameDoc.querySelector("[data-we-widget='button-toolbar']");
          const left = Array.from(frameDoc.querySelectorAll("button")).find((e) => e.textContent.trim() === "L+");
          const right = Array.from(frameDoc.querySelectorAll("button")).find((e) => e.textContent.trim() === "R-");
          const leftText = Array.from(frameDoc.querySelectorAll("[data-we-widget='text']")).find((e) => e.textContent.trim().startsWith("parity-L:"));
          const rightText = Array.from(frameDoc.querySelectorAll("[data-we-widget='text']")).find((e) => e.textContent.trim().startsWith("parity-R:"));
          if (toolbar && left && right && leftText && rightText) return { toolbar, left, right, leftText, rightText };
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity button-toolbar smoke UI");
    }
    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });
        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.toolbar.getAttribute("class"), "we-button-toolbar", "parity button-toolbar class");
        assertEqual(ui.leftText.textContent.trim(), "parity-L:2", "parity initial left text");
        assertEqual(ui.rightText.textContent.trim(), "parity-R:20", "parity initial right text");
        ui.left.click(); ui.right.click();
        await sleep(100);
        assertEqual(ui.leftText.textContent.trim(), "parity-L:3", "parity left text after click");
        assertEqual(ui.rightText.textContent.trim(), "parity-R:19", "parity right text after click");
        setStatus("PASS\nparity button-toolbar groups multiple button-groups", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
