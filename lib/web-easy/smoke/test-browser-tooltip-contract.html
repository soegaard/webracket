<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy tooltip contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 300px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running tooltip contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tooltip" title="web-easy tooltip contract app"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertTrue(v, label) { if (!v) throw new Error(label + ": expected true, got false"); }
    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const trigger = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "apply");
          const bubble = frameDoc.querySelector("[data-we-widget='tooltip-bubble']");
          const setLong = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "set-long");
          const retitle = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "retitle");
          if (trigger && bubble && setLong && retitle) {
            return { trigger, bubble, setLong, retitle };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for tooltip contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.bubble.getAttribute("role"), "tooltip", "tooltip role");
        assertTrue(!!ui.bubble.getAttribute("id"), "tooltip id exists");
        assertEqual(ui.trigger.getAttribute("aria-describedby"), ui.bubble.getAttribute("id"), "trigger aria-describedby wiring");
        assertTrue(!!ui.bubble.querySelector("[data-we-widget='tooltip-header']"), "tooltip header exists");
        assertTrue(!!ui.bubble.querySelector("[data-we-widget='tooltip-body']"), "tooltip body exists");
        assertTrue(!!ui.bubble.querySelector("[data-we-widget='tooltip-footer']"), "tooltip footer exists");
        assertEqual(ui.bubble.textContent.trim(), "Apply actionClick to applyPress Esc to dismiss", "initial tooltip content");

        ui.setLong.click();
        await sleep(80);

        assertEqual(ui.bubble.textContent.trim(), "Apply actionClick to apply deployment profilePress Esc to dismiss", "tooltip body text updates");
        ui.retitle.click();
        await sleep(80);
        assertEqual(ui.bubble.textContent.trim(), "Apply deploymentClick to apply deployment profilePress Esc to dismiss", "tooltip header updates");
        setStatus("PASS\ntooltip contract: role + aria-describedby + structured regions + reactive updates", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
