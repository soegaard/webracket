<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy choice keyboard deep contract</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 300px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running deep choice keyboard contract...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=choice-labeled"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=choice-labeled",
          (d) => !!d.querySelector("[data-we-widget='choice']") && d.querySelectorAll("option").length >= 3,
          20000
        );
        const select = doc.querySelector("[data-we-widget='choice']");
        const selectedText = function () {
          const node = Array.from(doc.querySelectorAll("[data-we-widget='text']"))
            .find((el) => (el.textContent || "").trim().startsWith("selected:"));
          return node ? (node.textContent || "").trim() : "";
        };

        select.focus();
        await H.sleep(30);
        select.selectedIndex = select.options.length - 1;
        select.dispatchEvent(new Event("change", { bubbles: true }));
        await H.sleep(80);
        H.assertEqual(selectedText(), "selected:blue", "End selects last option");

        select.selectedIndex = 0;
        select.dispatchEvent(new Event("change", { bubbles: true }));
        await H.sleep(80);
        H.assertEqual(selectedText(), "selected:red", "Home selects first option");

        H.setStatus("PASS\nchoice deep keyboard: Home/End change selected id", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
