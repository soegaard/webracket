<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy close-button contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 240px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running close-button contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=close-button"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function pseudoContent(frameWin, el, pseudo) {
      return frameWin.getComputedStyle(el, pseudo).content || "";
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frameDocFrom(frame);
        if (doc) {
          const button = doc.querySelector("[data-we-widget='close-button']");
          const icon = doc.querySelector("[data-we-widget='close-button-icon']");
          if (button && icon) return { doc, button, icon };
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for close-button contract UI");
    }

    (async () => {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const frameWin = frame.contentWindow;

        assertEqual(ui.button.getAttribute("class"), "we-close-button", "close-button class");
        assertEqual(ui.button.getAttribute("role"), "button", "close-button role");
        assertEqual(ui.button.getAttribute("aria-label"), "Close panel", "close-button aria-label");

        const defaultGlyph = pseudoContent(frameWin, ui.icon, "::before");
        assertTrue(defaultGlyph.includes("×"), "default close glyph");

        ui.doc.documentElement.style.setProperty("--we-close-glyph", "'✕'");
        await sleep(50);
        const customGlyph = pseudoContent(frameWin, ui.icon, "::before");
        assertTrue(customGlyph.includes("✕"), "custom close glyph from --we-close-glyph");

        setStatus("PASS\nclose-button contract: class + aria-label + --we-close-glyph token", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
