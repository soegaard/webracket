<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity menu keyboard smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 240px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity menu keyboard assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-menu-keys" title="web-easy parity menu keyboard app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuItem(frameDoc) {
      return frameDoc.querySelector('.we-menu-item[role="button"]');
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const item = menuItem(frameDoc);
          const text = bodyText(frameDoc);
          if (item && text.includes("count:0")) {
            return { frameDoc, item };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity menu keyboard smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertTrue(ui.item.getAttribute("role") === "button", "menu-item role");
        assertTrue(ui.item.getAttribute("tabindex") === "0", "menu-item tabindex");

        ui.item.focus();
        await sleep(50);
        assertTrue(ui.frameDoc.activeElement === ui.item, "menu-item focus");
        const cs = ui.frameDoc.defaultView.getComputedStyle(ui.item);
        assertTrue(cs.outlineStyle !== "none", "menu-item focus outline visible");

        ui.item.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
        await sleep(75);
        assertTrue(bodyText(ui.frameDoc).includes("count:1"), "Enter increments count");

        ui.item.dispatchEvent(new KeyboardEvent("keydown", { key: " ", bubbles: true }));
        await sleep(75);
        assertTrue(bodyText(ui.frameDoc).includes("count:2"), "Space increments count");

        setStatus("PASS\nparity menu-item focus + Enter/Space activation", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: menu-items=" + frameDoc.querySelectorAll('.we-menu-item[role="button"]').length +
             " body=" + JSON.stringify(bodyText(frameDoc)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
