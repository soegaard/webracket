<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity toast behavior contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:320px;border:1px solid #999}</style></head><body><div id="status">Running parity toast behavior contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-toast"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));} function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertTrue(v,l){if(!v)throw new Error(l+': expected true, got false');}
async function waitForUI(frame,t){const s=Date.now();while(Date.now()-s<t){const d=frameDocFrom(frame);if(d){const showError=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='show-danger');const showLocked=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='show-locked');const toast=d.querySelector("[data-we-widget='toast']");if(showError&&showLocked&&toast)return{d,showError,showLocked,toast};}await sleep(25);}throw new Error('Timed out waiting for parity toast behavior contract UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const tt=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(tt);res();},{once:true});});const ui=await waitForUI(f,2e4);const close=ui.d.querySelector("[data-we-widget='toast-close']");assertTrue(!!close,'parity close button exists');close.focus();close.dispatchEvent(new KeyboardEvent('keydown',{key:'Enter',bubbles:true}));close.click();await sleep(80);assertTrue(ui.toast.getAttribute('aria-hidden')==='true','parity toast hidden after keyboard/click close');ui.showError.click();await sleep(80);assertTrue(ui.toast.getAttribute('aria-hidden')==='false','parity toast visible after show-danger');ui.showLocked.click();await sleep(80);const closeAfterLocked=ui.d.querySelector("[data-we-widget='toast-close']");assertTrue(!closeAfterLocked,'parity toast close hidden when non-dismissible');setStatus('PASS\nparity toast behavior contract: keyboard close + non-dismissible mode','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
