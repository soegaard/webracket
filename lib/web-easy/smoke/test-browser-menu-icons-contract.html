<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy menu-icons contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running menu-icons contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-icons" title="web-easy menu-icons contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=menu-icons", (d) => !!d.querySelector("[data-we-widget='menu-label']"), 20000);
        H.assertNoForbiddenAttrTokens(doc, "menu-icons-contract");
        H.assertNoInlineWidgetStyles(doc, "menu-icons-contract");

        const label = doc.querySelector("[data-we-widget='menu-label']");
        const status = Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((e) => (e.textContent || "").trim().startsWith("status:"));
        label.click();
        await H.sleep(80);

        const items = Array.from(doc.querySelectorAll("[data-we-widget='menu-item']"));
        const plain = items.find((item) => (item.textContent || "").trim() === "Plain");
        const save = items.find((item) => (item.textContent || "").trim().includes("Save"));
        const leading = save.querySelector(".we-menu-item-icon-leading[data-we-widget='menu-item-icon']");
        const trailing = save.querySelector(".we-menu-item-icon-trailing[data-we-widget='menu-item-icon']");
        H.assertTrue(!!leading && !!trailing, "icon menu-item exposes leading/trailing slots");
        H.assertEqual(plain.querySelectorAll("[data-we-widget='menu-item-icon']").length, 0, "plain menu-item has no icon slots");

        plain.click();
        await H.sleep(80);
        H.assertEqual((status.textContent || "").trim(), "status:plain", "plain menu-item action works");
        label.click();
        await H.sleep(80);
        save.click();
        await H.sleep(80);
        H.assertEqual((status.textContent || "").trim(), "status:save", "icon menu-item action works");

        H.setStatus("PASS\nmenu-icons contract: icon slots + plain fallback behavior", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
