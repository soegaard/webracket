<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy button-toolbar contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:240px;border:1px solid #999}</style></head>
<body><div id="status">Running button-toolbar contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=button-toolbar" title="web-easy button-toolbar contract app"></iframe>
<script>
function setStatus(t,c){const s=document.getElementById("status");s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+": expected "+JSON.stringify(w)+", got "+JSON.stringify(g));}
async function waitForUI(frame,timeoutMs){const start=Date.now(); while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame); if(d){const toolbar=d.querySelector("[data-we-widget='button-toolbar']"); const groups=d.querySelectorAll("[data-we-widget='button-group']"); const l=d.querySelector("button"); const left=Array.from(d.querySelectorAll("[data-we-widget='text']")).find((e)=>e.textContent.trim().startsWith("L:")); const right=Array.from(d.querySelectorAll("[data-we-widget='text']")).find((e)=>e.textContent.trim().startsWith("R:")); if(toolbar&&groups.length===2&&l&&left&&right)return{toolbar,groups,left,right};} await sleep(25);} throw new Error("Timed out waiting for button-toolbar contract UI");}
(async function run(){try{const frame=document.getElementById("app-frame"); await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error("Timed out loading iframe")),20000); frame.addEventListener("load",()=>{clearTimeout(t);res();},{once:true});}); const ui=await waitForUI(frame,20000);
assertEqual(ui.toolbar.getAttribute("class"),"we-button-toolbar","button-toolbar class"); assertEqual(String(ui.groups.length),"2","toolbar group count"); assertEqual(ui.left.textContent.trim(),"L:0","left initial"); assertEqual(ui.right.textContent.trim(),"R:10","right initial"); setStatus("PASS\nbutton-toolbar contract: toolbar class + two groups + text wiring","pass");}catch(err){console.error(err); setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
