<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy carousel wrap contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:320px;border:1px solid #999}</style></head>
<body><div id="status">Running carousel wrap contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=carousel-advanced"></iframe><script src="./smoke-harness.js"></script><script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-smoke-all.html?test=carousel-advanced",(d)=>!!d.querySelector("[data-we-widget='carousel-next']"),2e4);const btn=(label)=>Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()===label);btn("set-wrap-off").click();btn("set-last").click();await H.sleep(80);doc.querySelector("[data-we-widget='carousel-next']").click();await H.sleep(80);const indexText=Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((n)=>(n.textContent||"").trim().startsWith("index:"));const next=doc.querySelector("[data-we-widget='carousel-next']");H.assertEqual((indexText.textContent||"").trim(),"index:2","index stays at last when wrap off");H.assertEqual(next.getAttribute("aria-disabled"),"true","next disabled at end when wrap off");H.setStatus("PASS\ncarousel wrap contract: no wrap at end", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
</script></body></html>
