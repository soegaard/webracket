<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser button-icons smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running browser button-icons smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=button-icons" title="web-easy button-icons smoke app"></iframe>

  <script>
    function setStatus(text, cls) { const status = document.getElementById("status"); status.textContent = text; status.className = cls; }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertEqual(got, want, label) { if (got !== want) { throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got)); } }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const leading = frameDoc.querySelector(".we-button-icon-leading[data-we-widget='button-icon']");
          const trailing = frameDoc.querySelector(".we-button-icon-trailing[data-we-widget='button-icon']");
          const btn = Array.from(frameDoc.querySelectorAll("[data-we-widget='button']"))
            .find((e) => e.textContent.trim().includes("apply"));
          const text = Array.from(frameDoc.querySelectorAll("[data-we-widget='text']"))
            .find((e) => e.textContent.trim().startsWith("count:"));
          if (leading && trailing && btn && text) {
            return { leading, trailing, btn, text };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for button-icons smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.leading.textContent.trim(), "✓", "leading icon");
        assertEqual(ui.trailing.textContent.trim(), "→", "trailing icon");
        ui.btn.click();
        await sleep(100);
        assertEqual(ui.text.textContent.trim(), "count:1", "count after click");
        setStatus("PASS\nbutton leading/trailing icon slots render", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
