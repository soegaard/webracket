<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy placeholder contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running placeholder contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=placeholder" title="web-easy placeholder contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=placeholder", (d) => !!d.querySelector("[data-we-widget='placeholder']"), 20000);
        H.assertNoForbiddenAttrTokens(doc, "placeholder-contract");
        H.assertNoInlineWidgetStyles(doc, "placeholder-contract");
        const placeholder = doc.querySelector("[data-we-widget='placeholder']");
        const narrow = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "width-narrow");
        H.assertTrue((placeholder.getAttribute("class") || "").includes("we-placeholder"), "placeholder base class");
        narrow.click();
        await H.sleep(80);
        H.assertEqual(placeholder.getAttribute("width"), "6em", "placeholder width attribute update");
        H.setStatus("PASS\nplaceholder contract: base class + width attribute", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
