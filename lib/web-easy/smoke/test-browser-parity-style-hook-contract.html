<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity style hook contract test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 420px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity style hook contract assertions...</div>
  <iframe id="app-frame" src="about:blank" title="web-easy parity style hook contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    function assertHook(frameDoc, selector, label) {
      assertTrue(!!frameDoc.querySelector(selector), label + " hook present: " + selector);
    }

    function checkParityTabHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='tab-panel'].we-tab-panel", "parity tabs panel");
      assertHook(frameDoc, "[data-we-widget='tab-list'].we-tab-list", "parity tabs list");
      assertHook(frameDoc, "[data-we-widget='tab-button'].we-tab-btn", "parity tabs button");
      assertHook(frameDoc, "[data-we-widget='tab-content'].we-tab-content", "parity tabs content");
    }

    function checkParityDialogHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='dialog'].we-dialog", "parity dialog");
      assertHook(frameDoc, "[data-we-widget='dialog-panel'].we-dialog-panel", "parity dialog panel");
    }

    function checkParityProfileHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='radios'].we-radios", "parity profile radios");
      assertHook(frameDoc, "[data-we-widget='image'].we-image", "parity profile image");
      assertHook(frameDoc, "[data-we-widget='menu-bar'].we-menu-bar", "parity profile menu bar");
    }

    function checkParityMenuHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='menu-bar'].we-menu-bar", "parity menu bar");
      assertHook(frameDoc, "[data-we-widget='menu'].we-menu", "parity menu");
      assertHook(frameDoc, "[data-we-widget='menu-label'].we-menu-label", "parity menu label");
      assertHook(frameDoc, "[data-we-widget='menu-popup'].we-menu-popup", "parity menu popup");
      assertHook(frameDoc, "[data-we-widget='menu-item'].we-menu-item", "parity menu item");
    }

    function checkParityMenuStateHooks(frameDoc) {
      const label = frameDoc.querySelector("[data-we-widget='menu-label'].we-menu-label");
      const popup = frameDoc.querySelector("[data-we-widget='menu-popup'].we-menu-popup");
      assertTrue(!!label, "parity menu state label present");
      assertTrue(!!popup, "parity menu state popup present");

      label.click();
      assertTrue(label.getAttribute("aria-expanded") === "true", "parity menu aria-expanded true after click");
      assertTrue(popup.className.includes("is-open"), "parity menu popup has is-open class after click");

      label.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
      assertTrue(label.getAttribute("aria-expanded") === "false", "parity menu aria-expanded false after Escape");
      assertTrue(!popup.className.includes("is-open"), "parity menu popup closes after Escape");
    }

    function checkParityProgressHooks(frameDoc) {
      const progress = frameDoc.querySelector("[data-we-widget='progress'].we-progress");
      const successBtn = Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => b.textContent.trim() === "set-success");
      const errorBtn = Array.from(frameDoc.querySelectorAll("button"))
        .find((b) => b.textContent.trim() === "set-error");
      assertTrue(!!progress, "parity progress hook progress node present");
      assertTrue(!!successBtn, "parity progress hook success button present");
      assertTrue(!!errorBtn, "parity progress hook error button present");

      successBtn.click();
      assertTrue(progress.className.includes("we-progress-success"), "parity progress hook success class");
      errorBtn.click();
      assertTrue(progress.className.includes("we-progress-error"), "parity progress hook error class");
    }

    function checkParityTooltipHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='tooltip'].we-tooltip", "parity tooltip");
      assertHook(frameDoc, "[data-we-widget='tooltip-trigger'].we-tooltip-trigger", "parity tooltip trigger");
      assertHook(frameDoc, "[data-we-widget='tooltip-bubble'].we-tooltip-bubble", "parity tooltip bubble");
    }

    function checkParityPopoverHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='popover'].we-popover", "parity popover");
      assertHook(frameDoc, "[data-we-widget='popover-trigger'].we-popover-trigger", "parity popover trigger");
      assertHook(frameDoc, "[data-we-widget='popover-backdrop'].we-popover-backdrop", "parity popover backdrop");
      assertHook(frameDoc, "[data-we-widget='popover-panel'].we-popover-panel", "parity popover panel");
    }

    function checkParityAlertHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='alert'].we-alert", "parity alert");
    }

    function checkParityBadgeHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='badge'].we-badge", "parity badge");
    }

    function checkParitySpinnerHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='spinner'].we-spinner", "parity spinner");
    }

    function checkParityPaginationHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='pagination'].we-pagination", "parity pagination");
      assertHook(frameDoc, "[data-we-widget='page-button'].we-page-btn", "parity page button");
    }

    function checkParityBreadcrumbHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='breadcrumb'].we-breadcrumb", "parity breadcrumb");
      assertHook(frameDoc, "[data-we-widget='breadcrumb-item'].we-breadcrumb-item", "parity breadcrumb item");
    }

    function checkParityListGroupHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='list-group'].we-list-group", "parity list-group");
      assertHook(frameDoc, "[data-we-widget='list-group-item'].we-list-group-item", "parity list-group item");
    }

    function checkParityToastHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='toast'].we-toast", "parity toast");
    }

    function checkParityCollapseHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='collapse'].we-collapse", "parity collapse");
    }

    function checkParityAccordionHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='accordion'].we-accordion", "parity accordion");
      assertHook(frameDoc, "[data-we-widget='accordion-trigger'].we-accordion-trigger", "parity accordion trigger");
    }

    function checkParityOffcanvasHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='offcanvas'].we-offcanvas", "parity offcanvas");
      assertHook(frameDoc, "[data-we-widget='offcanvas-panel'].we-offcanvas-panel", "parity offcanvas panel");
      assertHook(frameDoc, "[data-we-widget='offcanvas-backdrop'].we-offcanvas-backdrop", "parity offcanvas backdrop");
      assertHook(frameDoc, "[data-we-widget='close-button'].we-close-button", "parity offcanvas close button");
    }

    function checkParityCloseButtonHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='close-button'].we-close-button", "parity close-button");
      assertHook(frameDoc, "[data-we-widget='close-button-icon'].we-close-button-icon", "parity close-button icon");
    }

    function checkParityPlaceholderHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='placeholder'].we-placeholder", "parity placeholder");
    }

    function checkParityCarouselHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='carousel'].we-carousel", "parity carousel");
      assertHook(frameDoc, "[data-we-widget='carousel-indicator'].we-carousel-indicator", "parity carousel indicator");
    }

    function checkParityScrollspyHooks(frameDoc) {
      assertHook(frameDoc, "[data-we-widget='scrollspy'].we-scrollspy", "parity scrollspy");
      assertHook(frameDoc, "[data-we-widget='scrollspy-nav'].we-scrollspy-nav", "parity scrollspy nav");
      assertHook(frameDoc, "[data-we-widget='scrollspy-sections'].we-scrollspy-sections", "parity scrollspy sections");
      assertHook(frameDoc, "[data-we-widget='scrollspy-section'].we-scrollspy-section", "parity scrollspy section");
      assertHook(frameDoc, "[data-we-widget='scrollspy-item'].we-scrollspy-item", "parity scrollspy item");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        const timeoutMs = 20000;

        const tabsDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-tabs",
          (d) => d.querySelector("[data-we-widget='tab-button']"),
          timeoutMs
        );
        checkParityTabHooks(tabsDoc);

        const dialogDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-dialog",
          (d) => d.querySelector("[data-we-widget='dialog-panel']"),
          timeoutMs
        );
        checkParityDialogHooks(dialogDoc);

        const profileDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-profile",
          (d) => d.querySelector("[data-we-widget='image']"),
          timeoutMs
        );
        checkParityProfileHooks(profileDoc);

        const parityMenuDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-menu-full",
          (d) => d.querySelector("[data-we-widget='menu-item']"),
          timeoutMs
        );
        checkParityMenuHooks(parityMenuDoc);
        checkParityMenuStateHooks(parityMenuDoc);

        const progressDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-progress",
          (d) => d.querySelector("[data-we-widget='progress']"),
          timeoutMs
        );
        checkParityProgressHooks(progressDoc);

        const tooltipDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-tooltip",
          (d) => d.querySelector("[data-we-widget='tooltip-bubble']"),
          timeoutMs
        );
        checkParityTooltipHooks(tooltipDoc);

        const popoverDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-popover",
          (d) => d.querySelector("[data-we-widget='popover-panel']"),
          timeoutMs
        );
        checkParityPopoverHooks(popoverDoc);

        const alertDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-alert",
          (d) => d.querySelector("[data-we-widget='alert']"),
          timeoutMs
        );
        checkParityAlertHooks(alertDoc);

        const badgeDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-badge",
          (d) => d.querySelector("[data-we-widget='badge']"),
          timeoutMs
        );
        checkParityBadgeHooks(badgeDoc);

        const spinnerDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-spinner",
          (d) => d.querySelector("[data-we-widget='spinner']"),
          timeoutMs
        );
        checkParitySpinnerHooks(spinnerDoc);

        const paginationDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-pagination",
          (d) => d.querySelector("[data-we-widget='page-button']"),
          timeoutMs
        );
        checkParityPaginationHooks(paginationDoc);

        const breadcrumbDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-breadcrumb",
          (d) => d.querySelector("[data-we-widget='breadcrumb-item']"),
          timeoutMs
        );
        checkParityBreadcrumbHooks(breadcrumbDoc);

        const listGroupDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-list-group",
          (d) => d.querySelector("[data-we-widget='list-group-item']"),
          timeoutMs
        );
        checkParityListGroupHooks(listGroupDoc);

        const toastDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-toast",
          (d) => d.querySelector("[data-we-widget='toast']"),
          timeoutMs
        );
        checkParityToastHooks(toastDoc);

        const collapseDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-collapse",
          (d) => d.querySelector("[data-we-widget='collapse']"),
          timeoutMs
        );
        checkParityCollapseHooks(collapseDoc);

        const accordionDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-accordion",
          (d) => d.querySelector("[data-we-widget='accordion-trigger']"),
          timeoutMs
        );
        checkParityAccordionHooks(accordionDoc);

        const offcanvasDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-offcanvas",
          (d) => d.querySelector("[data-we-widget='offcanvas-panel']"),
          timeoutMs
        );
        checkParityOffcanvasHooks(offcanvasDoc);

        const closeButtonDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-close-button",
          (d) => d.querySelector("[data-we-widget='close-button']"),
          timeoutMs
        );
        checkParityCloseButtonHooks(closeButtonDoc);

        const placeholderDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-placeholder",
          (d) => d.querySelector("[data-we-widget='placeholder']"),
          timeoutMs
        );
        checkParityPlaceholderHooks(placeholderDoc);

        const carouselDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-carousel",
          (d) => d.querySelector("[data-we-widget='carousel-indicator']"),
          timeoutMs
        );
        checkParityCarouselHooks(carouselDoc);

        const scrollspyDoc = await loadCase(
          frame,
          "./generated/example-browser-parity-all.html?test=parity-scrollspy",
          (d) => d.querySelector("[data-we-widget='scrollspy-item']"),
          timeoutMs
        );
        checkParityScrollspyHooks(scrollspyDoc);

        setStatus("PASS\nparity style hook contract: class + data-we-widget markers stable", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
