<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy navigation-bar contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running navigation-bar contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=navigation-bar" title="web-easy navigation-bar contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=navigation-bar", (d) => !!d.querySelector("[data-we-widget='navigation-bar']"), 20000);
        H.assertNoForbiddenAttrTokens(doc, "navigation-bar-contract");
        H.assertNoInlineWidgetStyles(doc, "navigation-bar-contract");
        const bar = doc.querySelector("[data-we-widget='navigation-bar']");
        const home = Array.from(doc.querySelectorAll("button")).find((e) => (e.textContent || "").trim() === "home");
        const about = Array.from(doc.querySelectorAll("button")).find((e) => (e.textContent || "").trim() === "about");
        const text = doc.querySelector("[data-we-widget='text']");
        H.assertEqual(bar.getAttribute("role"), "navigation", "navigation-bar role");
        H.assertEqual((text.textContent || "").trim(), "nav:home", "navigation-bar initial text");
        about.click();
        await H.sleep(100);
        H.assertEqual((text.textContent || "").trim(), "nav:about", "navigation-bar text after about click");
        home.click();
        await H.sleep(100);
        H.assertEqual((text.textContent || "").trim(), "nav:home", "navigation-bar text after home click");
        H.setStatus("PASS\nnavigation-bar contract: role + action updates", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
