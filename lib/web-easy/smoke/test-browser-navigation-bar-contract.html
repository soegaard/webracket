<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy navigation-bar contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running navigation-bar contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=navigation-bar" title="web-easy navigation-bar contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const bar = frameDoc.querySelector("[data-we-widget='navigation-bar']");
          const home = Array.from(frameDoc.querySelectorAll("button"))
            .find((e) => e.textContent.trim() === "home");
          const about = Array.from(frameDoc.querySelectorAll("button"))
            .find((e) => e.textContent.trim() === "about");
          const text = frameDoc.querySelector("[data-we-widget='text']");
          if (bar && home && about && text) {
            return { bar, home, about, text };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for navigation-bar contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.bar.getAttribute("role"), "navigation", "navigation-bar role");
        assertEqual(ui.text.textContent.trim(), "nav:home", "navigation-bar initial text");

        ui.about.click();
        await sleep(100);
        assertEqual(ui.text.textContent.trim(), "nav:about", "navigation-bar text after about click");

        ui.home.click();
        await sleep(100);
        assertEqual(ui.text.textContent.trim(), "nav:home", "navigation-bar text after home click");

        setStatus("PASS\nnavigation-bar contract: role + action updates", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
