<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy menu typeahead timeout contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running menu typeahead timeout contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-full" title="web-easy menu typeahead timeout contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=menu-full",
          (d) => d.querySelectorAll("[data-we-widget='menu-label']").length >= 2,
          20000
        );

        H.assertNoForbiddenAttrTokens(doc, "menu-typeahead-timeout");
        H.assertNoInlineWidgetStyles(doc, "menu-typeahead-timeout");

        const fileLabel = Array.from(doc.querySelectorAll("[data-we-widget='menu-label']"))
          .find((e) => (e.textContent || "").trim() === "File");
        H.assertTrue(!!fileLabel, "File menu label");

        fileLabel.click();
        await H.sleep(80);
        H.dispatchKey(fileLabel, "s");
        await H.sleep(90);
        H.assertEqual(((doc.activeElement && doc.activeElement.textContent) || "").trim(), "save", "typeahead s focuses save");

        await H.sleep(850);
        H.dispatchKey(fileLabel, "o");
        await H.sleep(90);
        H.assertEqual(((doc.activeElement && doc.activeElement.textContent) || "").trim(), "open", "typeahead query resets after timeout");

        H.setStatus("PASS\nmenu typeahead timeout contract: prefix resets after timeout window", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
