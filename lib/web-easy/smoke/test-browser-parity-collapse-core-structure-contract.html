<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity collapse core structure contract test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 240px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity collapse core structure contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-collapse" title="web-easy parity collapse core structure contract app"></iframe>
  <script>
    function setStatus(text, cls) {
      const node = document.getElementById("status");
      node.textContent = text;
      node.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, expected, label) {
      if (got !== expected) {
        throw new Error(label + ": expected " + JSON.stringify(expected) + ", got " + JSON.stringify(got));
      }
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frameDocFrom(frame);
        if (doc) {
          const collapse = doc.querySelector(".we-collapse");
          const toggle = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "toggle");
          if (collapse && toggle) {
            return { doc, collapse, toggle };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity collapse core structure UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.collapse.getAttribute("class"), "we-collapse", "collapse class (closed)");
        assertEqual(ui.collapse.getAttribute("aria-hidden"), "true", "collapse aria-hidden (closed)");

        ui.toggle.click();
        await sleep(140);

        assertEqual(ui.collapse.getAttribute("class"), "we-collapse is-open", "collapse class (open)");
        assertEqual(ui.collapse.getAttribute("aria-hidden"), "false", "collapse aria-hidden (open)");

        const coreCss = await (await fetch("./themes/web-easy-core.css")).text();
        assertTrue(coreCss.includes(".we-collapse"), "core css has .we-collapse rule");
        assertTrue(coreCss.includes("grid-template-rows: 0fr"), "core css has closed grid row mechanics");
        assertTrue(coreCss.includes(".we-collapse.is-open"), "core css has open class rule");

        setStatus("PASS\nparity collapse core structure: core css defines grid mechanics; class/aria transitions are wired", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
