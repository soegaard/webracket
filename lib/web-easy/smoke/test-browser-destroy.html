<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser destroy smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser destroy smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=destroy" title="web-easy destroy smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function findCounterText(frameDoc) {
      const text = (frameDoc.body && frameDoc.body.textContent) ? frameDoc.body.textContent : "";
      const m = text.match(/count:(-?\d+)/);
      return m ? m[0] : null;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const buttons = Array.from(frameDoc.querySelectorAll("button"));
          const inc = buttons.find((b) => b.textContent.trim() === "inc");
          const destroy = buttons.find((b) => b.textContent.trim() === "destroy");
          const numberText = findCounterText(frameDoc);
          if (inc && destroy && numberText !== null) {
            return { frameDoc, inc, destroy, numberText };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for destroy smoke UI");
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.numberText, "count:0", "initial value");

        ui.inc.click();
        await sleep(100);
        assertEqual(findCounterText(ui.frameDoc), "count:1", "value after increment");

        ui.destroy.click();
        await sleep(100);

        ui.inc.click();
        await sleep(100);
        assertEqual(findCounterText(ui.frameDoc), "count:1", "value unchanged after destroy + increment");

        setStatus("PASS\nbefore-destroy increment works; after-destroy UI stays unchanged", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const snapshot = frameDoc && frameDoc.body ? frameDoc.body.textContent : "<no frame body>";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\nbody=" + JSON.stringify(snapshot), "fail");
      }
    })();
  </script>
</body>
</html>
