<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser theme menu-vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser theme menu-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-full" title="web-easy theme menu vars app"></iframe>

  <script src="./themes/theme-contract-helper.js"></script>
  <script>
    const themeHelper = window.themeContractHelper;
    const THEME_LAYER_OPTIONS = {
      themeClass: "we-theme-solar2",
      coreHref: "../themes/web-easy-core.css",
      themeHref: "../themes/theme-contract-vars.css"
    };

    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = themeHelper.frameDocFrom(frame);
        if (frameDoc) {
          themeHelper.ensureThemeLayer(frameDoc, THEME_LAYER_OPTIONS);
        }
        if (frameDoc) {
          const bar = frameDoc.querySelector(".we-menu-bar[role='menubar']");
          const fileLabel = Array.from(frameDoc.querySelectorAll(".we-menu-label"))
            .find((el) => (el.textContent || "").trim() === "File");
          if (bar && fileLabel) {
            return { frameDoc, bar, fileLabel };
          }
        }
        await themeHelper.sleep(25);
      }
      throw new Error("Timed out waiting for theme menu-vars UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const bgBefore = themeHelper.normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);
        const borderBefore = themeHelper.normalizedCssColor(getComputedStyle(ui.bar).borderTopColor);

        ui.frameDoc.documentElement.style.setProperty("--we-bg-subtle", "rgb(225, 245, 235)");
        ui.frameDoc.documentElement.style.setProperty("--we-border-menu", "rgb(18, 100, 60)");
        await themeHelper.sleep(80);

        const bgAfter = themeHelper.normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);
        const borderAfter = themeHelper.normalizedCssColor(getComputedStyle(ui.bar).borderTopColor);

        themeHelper.assertTrue(bgAfter === "rgb(225,245,235)", "menu bar background follows --we-bg-subtle");
        themeHelper.assertTrue(borderAfter === "rgb(18,100,60)", "menu bar border follows --we-border-menu");
        themeHelper.assertTrue(bgAfter !== bgBefore, "menu bar background changed after var update");
        themeHelper.assertTrue(borderAfter !== borderBefore, "menu bar border changed after var update");

        setStatus(
          "PASS\nmenu bar styles update via CSS variables (--we-bg-subtle/--we-border-menu)",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
