<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy tab core structure contract test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running tab core structure contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tab-panel" title="web-easy tab core structure contract app"></iframe>
  <script>
    function setStatus(text, cls) {
      const node = document.getElementById("status");
      node.textContent = text;
      node.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, expected, label) {
      if (got !== expected) {
        throw new Error(label + ": expected " + JSON.stringify(expected) + ", got " + JSON.stringify(got));
      }
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frameDocFrom(frame);
        if (doc) {
          const tabList = doc.querySelector(".we-tab-list");
          const tabPanel = doc.querySelector(".we-tab-panel");
          if (tabList && tabPanel) {
            return { doc, tabList, tabPanel };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for tab core structure UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertTrue(ui.doc.querySelectorAll(".we-tab-btn").length >= 3, "tab buttons present");
        assertEqual(ui.doc.querySelectorAll(".we-tab-btn[aria-selected='true']").length, 1, "single selected tab header");

        const coreCss = await (await fetch("./themes/web-easy-core.css")).text();
        assertTrue(coreCss.includes(".we-tab-list"), "core css has .we-tab-list rule");
        assertTrue(coreCss.includes("flex-wrap: wrap"), "core css has tab-list wrap mechanics");
        assertTrue(coreCss.includes(".we-tab-panel"), "core css has .we-tab-panel rule");
        assertTrue(coreCss.includes("align-items: flex-end"), "core css has tab-list alignment mechanics");

        setStatus("PASS\ntab core structure: core css defines list wrap/align mechanics and tab roles are present", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
