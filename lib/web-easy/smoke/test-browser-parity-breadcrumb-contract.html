<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity breadcrumb contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity breadcrumb contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-breadcrumb" title="web-easy parity breadcrumb contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const nav = frameDoc.querySelector("[data-we-widget='breadcrumb']");
          const items = Array.from(frameDoc.querySelectorAll("[data-we-widget='breadcrumb-item']"));
          const home = items.find((e) => e.textContent.trim() === "Home");
          const api = items.find((e) => e.textContent.trim() === "API");
          if (nav && home && api) {
            return { frameDoc, nav, home, api };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity breadcrumb contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.nav.getAttribute("role"), "navigation", "parity breadcrumb role");
        assertEqual(ui.api.getAttribute("class"), "we-breadcrumb-item is-current", "parity breadcrumb initial current class");
        ui.home.click();
        await sleep(100);

        const itemsAfter = Array.from(ui.frameDoc.querySelectorAll("[data-we-widget='breadcrumb-item']"));
        const homeAfter = itemsAfter.find((e) => e.textContent.trim() === "Home");
        const apiAfter = itemsAfter.find((e) => e.textContent.trim() === "API");
        assertEqual(homeAfter.getAttribute("class"), "we-breadcrumb-item is-current", "parity breadcrumb current after click");
        assertEqual(apiAfter.getAttribute("class"), "we-breadcrumb-item", "parity breadcrumb non-current class after click");

        setStatus("PASS\nparity breadcrumb contract: role + current marker + click selection", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
