<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity menu close-reason contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity menu close-reason contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-menu-full" title="web-easy parity menu close-reason contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuLabelByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function menuItemByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-item[role="menuitem"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const projectLabel = menuLabelByText(frameDoc, "Project");
          const helpLabel = menuLabelByText(frameDoc, "Help");
          const buildItem = menuItemByText(frameDoc, "build");
          if (projectLabel && helpLabel && buildItem) {
            return { frameDoc, projectLabel, helpLabel, buildItem };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity menu close-reason contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const { frameDoc, projectLabel, helpLabel, buildItem } = ui;

        projectLabel.focus();
        projectLabel.click();
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "Project open before Escape");
        buildItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "false", "Escape closes Project");
        assertTrue(frameDoc.activeElement === projectLabel, "Escape returns focus to Project label");

        projectLabel.focus();
        projectLabel.click();
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "Project open before Tab");
        buildItem.focus();
        await sleep(40);
        buildItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Tab", bubbles: true }));
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "false", "Tab closes Project");

        projectLabel.focus();
        projectLabel.click();
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "Project open before focus-leave");
        buildItem.focus();
        await sleep(40);
        const outside = frameDoc.createElement("button");
        outside.type = "button";
        outside.textContent = "outside";
        outside.style.position = "absolute";
        outside.style.left = "-9999px";
        frameDoc.body.appendChild(outside);
        outside.focus();
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "false", "focus-leave closes Project");

        projectLabel.focus();
        projectLabel.click();
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "Project open before cross-menu switch");
        projectLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
        await sleep(60);
        assertTrue(projectLabel.getAttribute("aria-expanded") === "false", "switch closes Project");
        assertTrue(helpLabel.getAttribute("aria-expanded") === "true", "switch opens Help");
        assertTrue(frameDoc.activeElement === helpLabel, "switch focuses Help label");

        setStatus("PASS\nparity menu close-reason contract: Escape/Tab/focus-leave/switch", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: project=" + (menuLabelByText(frameDoc, "Project") || {}).getAttribute?.("aria-expanded") +
             " help=" + (menuLabelByText(frameDoc, "Help") || {}).getAttribute?.("aria-expanded") +
             " body=" + JSON.stringify(bodyText(frameDoc).slice(0, 240)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
