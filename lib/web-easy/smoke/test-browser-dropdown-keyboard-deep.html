<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy dropdown keyboard deep contract</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running deep dropdown keyboard contract...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=dropdown"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }

    async function waitForCondition(label, timeoutMs, pred) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (pred()) return;
        await sleep(25);
      }
      throw new Error("Timed out waiting for " + label);
    }

    function dispatchKey(el, key) {
      el.dispatchEvent(new KeyboardEvent("keydown", { key, bubbles: true }));
    }

    (async () => {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const doc = frameDocFrom(frame);
        await waitForCondition("dropdown trigger", 3000, () => !!doc.querySelector("[data-we-widget='menu-label']"));
        const label = doc.querySelector("[data-we-widget='menu-label']");

        dispatchKey(label, "ArrowDown");
        await waitForCondition("ArrowDown opens", 1500, () => label.getAttribute("aria-expanded") === "true");
        await waitForCondition("focus moves to first menu item", 1500, () => {
          const active = doc.activeElement;
          return !!active && active.getAttribute("data-we-widget") === "menu-item";
        });

        dispatchKey(doc.activeElement, "c");
        await waitForCondition("typeahead c focuses Close", 1500, () => {
          const active = doc.activeElement;
          return !!active && (active.textContent || "").trim().toLowerCase() === "close";
        });

        setStatus("PASS\ndropdown deep keyboard: ArrowDown open+focus and typeahead c->close", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
