<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser popover smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser popover smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=popover" title="web-easy popover smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const trigger = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "actions");
          const panel = frameDoc.querySelector("[data-we-widget='popover-panel']");
          const body = frameDoc.querySelector("[data-we-widget='popover-body']");
          const retitle = Array.from(frameDoc.querySelectorAll("button"))
            .find((b) => b.textContent.trim() === "retitle");
          if (trigger && panel && body && retitle) {
            return { frameDoc, trigger, panel, body, retitle };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for popover smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.panel.getAttribute("class"), "we-popover-panel", "initial popover class");
        assertEqual(ui.panel.getAttribute("aria-hidden"), "true", "popover starts hidden");

        ui.trigger.click();
        await sleep(100);

        assertTrue(ui.panel.getAttribute("class").includes("is-open"), "popover class after open");
        assertEqual(ui.panel.getAttribute("aria-hidden"), "false", "popover aria-hidden after open");
        assertTrue(!!ui.frameDoc.querySelector("[data-we-widget='popover-header']"), "popover header exists");
        assertTrue(!!ui.frameDoc.querySelector("[data-we-widget='popover-footer']"), "popover footer exists");
        assertTrue((ui.panel.textContent || "").includes("Deploy now?"), "popover title shows in header");
        assertTrue((ui.body.textContent || "").includes("Choose an action:"), "popover body text shows");

        ui.retitle.click();
        await sleep(100);

        assertTrue((ui.panel.textContent || "").includes("Deploy to staging?"), "popover title updates");

        ui.panel.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(100);

        assertEqual(ui.panel.getAttribute("aria-hidden"), "true", "popover closes on Escape");
        setStatus("PASS\npopover toggles open state, exposes structured regions, and closes on Escape", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
