<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity placeholder contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:260px;border:1px solid #999}</style></head><body><div id="status">Running parity placeholder contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-placeholder"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));} function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertTrue(v,l){if(!v)throw new Error(l+': expected true, got false');}
async function waitForUI(frame,t){const s=Date.now();while(Date.now()-s<t){const d=frameDocFrom(frame);if(d){const p=d.querySelector("[data-we-widget='placeholder']");const wide=[...d.querySelectorAll('button')].find(b=>b.textContent.trim()==='width-wide');if(p&&wide)return{p,wide};}await sleep(25);}throw new Error('Timed out waiting for parity placeholder contract UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const tt=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(tt);res();},{once:true});});const ui=await waitForUI(f,2e4);ui.wide.click();await sleep(80);assertTrue(ui.p.getAttribute('width')==='10em','parity placeholder width attribute update');setStatus('PASS\nparity placeholder contract: width attribute updates','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
