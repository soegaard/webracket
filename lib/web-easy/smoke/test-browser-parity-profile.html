<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity profile settings smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 340px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity profile settings assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-profile" title="web-easy parity profile settings app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuItemByText(frameDoc, label) {
      const buttons = Array.from(frameDoc.querySelectorAll("button"));
      const spans = Array.from(frameDoc.querySelectorAll("span"));
      return buttons.concat(spans)
        .find((el) => (el.textContent || "").trim() === label);
    }

    function openActionsMenu(frameDoc) {
      const actions = menuItemByText(frameDoc, "Actions");
      if (!actions) {
        throw new Error("Actions menu not found");
      }
      actions.click();
      return actions;
    }

    function clickActionsItem(frameDoc, label) {
      openActionsMenu(frameDoc);
      const item = menuItemByText(frameDoc, label);
      if (!item) {
        throw new Error(label + " menu item not found");
      }
      item.click();
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const text = bodyText(frameDoc);
          const mounted = frameDoc.querySelector("[data-we-widget='window']");
          if (mounted && text.includes("Profile:")) {
            return { frameDoc };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity profile settings UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 60000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 60000);
        let text = bodyText(ui.frameDoc);
        assertTrue(text.includes("mode:photo"), "initial mode text");
        assertTrue(text.includes("status:ready"), "initial status text");
        assertTrue(text.includes("Profile: Alice"), "initial profile text");
        assertTrue(text.includes("img:avatar-photo.png"), "initial image text");

        clickActionsItem(ui.frameDoc, "Rename Bob");
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("Profile: Bob"), "profile text updates after rename");
        assertTrue(text.includes("status:renamed"), "status after rename");

        clickActionsItem(ui.frameDoc, "Save preset");
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("status:saved"), "status after save preset");

        clickActionsItem(ui.frameDoc, "Reset");
        await sleep(100);
        text = bodyText(ui.frameDoc);
        assertTrue(text.includes("Profile: Alice"), "reset restored profile name");
        assertTrue(text.includes("mode:photo"), "reset restored mode");
        assertTrue(text.includes("img:avatar-photo.png"), "reset restored image");
        assertTrue(text.includes("status:reset"), "status after reset");

        setStatus("PASS\nprofile settings parity: image/profile/menu actions", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: radios=" + frameDoc.querySelectorAll("input[type='radio']").length +
             " images=" + frameDoc.querySelectorAll("[data-we-widget='image']").length +
             " body=" + JSON.stringify(bodyText(frameDoc)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
