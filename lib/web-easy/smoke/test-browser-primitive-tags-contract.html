<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy primitive tags contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running primitive tag contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=primitive-tags"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=primitive-tags",
          (d) => !!d.querySelector("#prim-h1"),
          20000
        );

        const h1 = doc.querySelector("#prim-h1");
        const p = doc.querySelector("#prim-p");
        const span = doc.querySelector("#prim-span");
        const img = doc.querySelector("#prim-img");
        const div = doc.querySelector("#prim-div");
        const divChild = doc.querySelector("#prim-div-child");

        H.assertEqual(h1.tagName.toLowerCase(), "h1", "H1 initial tag is h1");
        H.assertEqual(p.tagName.toLowerCase(), "p", "P initial tag is p");
        H.assertEqual(span.tagName.toLowerCase(), "span", "Span initial tag is span");
        H.assertEqual(img.tagName.toLowerCase(), "img", "Img initial tag is img");
        H.assertEqual(div.tagName.toLowerCase(), "div", "Div initial tag is div");
        H.assertEqual(divChild.tagName.toLowerCase(), "span", "Div child Span initial tag is span");

        H.setStatus("PASS\nprimitive tags contract", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
