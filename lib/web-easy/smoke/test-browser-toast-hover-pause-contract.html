<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy toast hover pause contract smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:320px;border:1px solid #999}</style></head>
<body><div id="status">Running toast hover pause contract assertions...</div><iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=toast-timing"></iframe><script src="./smoke-harness.js"></script><script>
(async function run(){const H=window.SmokeHarness;try{const frame=document.getElementById("app-frame");const doc=await H.loadCase(frame,"./generated/example-browser-smoke-all.html?test=toast-timing",(d)=>!!Array.from(d.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="show-paused"),2e4);const show=Array.from(doc.querySelectorAll("button")).find((b)=>(b.textContent||"").trim()==="show-paused");const toast=doc.querySelector("[data-we-widget='toast']");show.click();await H.sleep(120);toast.dispatchEvent(new MouseEvent("mouseenter", { bubbles: true }));await H.sleep(500);H.assertEqual(toast.getAttribute("aria-hidden"),"false","toast stays open while hovered");toast.dispatchEvent(new MouseEvent("mouseleave", { bubbles: true }));await H.sleep(500);H.assertEqual(toast.getAttribute("aria-hidden"),"true","toast closes after mouseleave");H.setStatus("PASS\ntoast hover pause contract", "pass");}catch(err){console.error(err);window.SmokeHarness.setStatus("FAIL\n"+(err&&err.message?err.message:String(err)),"fail");}})();
