<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser parity theme menu-vars smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 280px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser parity theme menu-vars assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-menu-full" title="web-easy parity theme menu vars app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function normalizedCssColor(v) {
      return (v || "").replace(/\s+/g, "").toLowerCase();
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const bar = frameDoc.querySelector(".we-menu-bar[role='menubar']");
          const labels = frameDoc.querySelectorAll(".we-menu-label[role='button']");
          if (bar && labels.length >= 2) {
            return { frameDoc, bar };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity theme menu-vars UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const bgBefore = normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);
        const borderBefore = normalizedCssColor(getComputedStyle(ui.bar).borderTopColor);

        ui.frameDoc.documentElement.style.setProperty("--we-bg-subtle", "rgb(240, 230, 250)");
        ui.frameDoc.documentElement.style.setProperty("--we-border-menu", "rgb(90, 50, 140)");
        await sleep(80);

        const bgAfter = normalizedCssColor(getComputedStyle(ui.bar).backgroundColor);
        const borderAfter = normalizedCssColor(getComputedStyle(ui.bar).borderTopColor);

        assertTrue(bgAfter === "rgb(240,230,250)", "menu bar background follows --we-bg-subtle");
        assertTrue(borderAfter === "rgb(90,50,140)", "menu bar border follows --we-border-menu");
        assertTrue(bgAfter !== bgBefore, "menu bar background changed after var update");
        assertTrue(borderAfter !== borderBefore, "menu bar border changed after var update");

        setStatus(
          "PASS\nparity menu bar styles update via CSS variables (--we-bg-subtle/--we-border-menu)",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
