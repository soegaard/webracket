<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity card smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 260px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity card smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-card" title="web-easy parity card app"></iframe>
  <script>
    function setStatus(text, cls) { const status = document.getElementById("status"); status.textContent = text; status.className = cls; }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertEqual(got, want, label) { if (got !== want) throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got)); }
    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const card = frameDoc.querySelector("[data-we-widget='card']");
          const header = frameDoc.querySelector("[data-we-widget='card-header']");
          const retitle = Array.from(frameDoc.querySelectorAll("button")).find((e) => e.textContent.trim() === "retitle");
          if (card && header && retitle) return { frameDoc, card, header, retitle };
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for parity card smoke UI");
    }
    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });
        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.card.getAttribute("class"), "we-card", "parity card class");
        assertEqual(ui.header.textContent.trim(), "Status", "parity initial header text");
        ui.retitle.click();
        await sleep(100);
        const headerAfter = ui.frameDoc.querySelector("[data-we-widget='card-header']");
        assertEqual(headerAfter.textContent.trim(), "Summary", "parity header text after update");
        setStatus("PASS\nparity card renders header/footer/body and updates title", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
