<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy theme contract dashboard</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
      max-width: 1000px;
    }
    #summary {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #summary.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #summary.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #999;
      padding: 6px 8px;
      text-align: left;
      vertical-align: top;
    }
    td.status-pass {
      color: #0a6a0a;
    }
    td.status-fail {
      color: #8a1111;
    }
  </style>
</head>
<body>
  <h1>web-easy theme contract dashboard</h1>
  <div id="summary">Running theme smoke pages...</div>
  <table id="results">
    <thead>
      <tr>
        <th>Test Page</th>
        <th>Status</th>
        <th>Message</th>
        <th>Duration (ms)</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="./dashboard-guard.js"></script>
  <script>
    const tests = [
      "test-browser-theme-token-contract.html",
      "test-browser-theme-token-api-contract.html",
      "test-browser-theme-core-link-contract.html",
      "test-browser-theme-starter-contract.html",
      "test-browser-theme-external-css-contract.html",
      "test-browser-theme-showcase-contract.html",
      "test-browser-theme-vars.html",
      "test-browser-theme-dialog-vars.html",
      "test-browser-theme-menu-vars.html",
      "test-browser-theme-progress-vars.html",
      "test-browser-parity-theme-vars.html",
      "test-browser-parity-theme-dialog-vars.html",
      "test-browser-parity-theme-menu-vars.html",
      "test-browser-parity-theme-progress-vars.html"
    ];

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function setSummary(text, cls) {
      const s = document.getElementById("summary");
      s.textContent = text;
      s.className = cls;
    }

    function appendRow(page, status, message, durationMs) {
      const tbody = document.querySelector("#results tbody");
      const tr = document.createElement("tr");

      const tdPage = document.createElement("td");
      const link = document.createElement("a");
      link.href = page;
      link.textContent = page;
      link.target = "_blank";
      tdPage.appendChild(link);

      const tdStatus = document.createElement("td");
      tdStatus.textContent = status;
      tdStatus.className = status === "PASS" ? "status-pass" : "status-fail";

      const tdMessage = document.createElement("td");
      tdMessage.textContent = message;

      const tdDuration = document.createElement("td");
      tdDuration.textContent = String(durationMs);

      tr.appendChild(tdPage);
      tr.appendChild(tdStatus);
      tr.appendChild(tdMessage);
      tr.appendChild(tdDuration);
      tbody.appendChild(tr);
    }

    async function runOne(page) {
      const frame = document.createElement("iframe");
      frame.style.position = "absolute";
      frame.style.left = "-10000px";
      frame.style.top = "0";
      frame.style.width = "900px";
      frame.style.height = "700px";
      frame.style.border = "0";
      frame.src = page;
      document.body.appendChild(frame);

      const timeoutMs = 30000;
      const start = Date.now();

      while (Date.now() - start < timeoutMs) {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (doc) {
          const status = doc.getElementById("status");
          if (status) {
            const text = (status.textContent || "").trim();
            if (text.startsWith("PASS")) {
              const offenders = window.smokeDashboardGuard.findForbiddenAttrTokensRecursively(doc, page);
              if (offenders.length > 0) {
                frame.remove();
                const samples = offenders.slice(0, 4).join("; ");
                return {
                  page,
                  ok: false,
                  message: "FAIL\\nFound forbidden token in DOM attributes: " + samples,
                  durationMs: Date.now() - start
                };
              }
              const styleOffenders = window.smokeDashboardGuard.findInlineStyleAttrsOnWidgetsRecursively(doc, page);
              if (styleOffenders.length > 0) {
                frame.remove();
                const samples = styleOffenders.slice(0, 4).join("; ");
                return {
                  page,
                  ok: false,
                  message: "FAIL\\nFound inline style on data-we-widget node: " + samples,
                  durationMs: Date.now() - start
                };
              }
              frame.remove();
              return { page, ok: true, message: text, durationMs: Date.now() - start };
            }
            if (text.startsWith("FAIL")) {
              frame.remove();
              return { page, ok: false, message: text, durationMs: Date.now() - start };
            }
          }
        }
        await sleep(50);
      }

      frame.remove();
      return {
        page,
        ok: false,
        message: "FAIL\\nTimed out waiting for PASS/FAIL status",
        durationMs: Date.now() - start
      };
    }

    (async function runAll() {
      const results = [];
      for (const page of tests) {
        const result = await runOne(page);
        results.push(result);
        appendRow(page, result.ok ? "PASS" : "FAIL", result.message, result.durationMs);
      }

      const passed = results.filter((r) => r.ok).length;
      const total = results.length;
      if (passed === total) {
        setSummary("PASS\\n" + passed + "/" + total + " theme tests passed", "pass");
      } else {
        setSummary("FAIL\\n" + passed + "/" + total + " theme tests passed", "fail");
      }
    })();
  </script>
</body>
</html>
