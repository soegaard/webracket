<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity headings smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running parity headings smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-headings"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-parity-all.html?test=parity-headings", (d) => !!d.querySelector("[data-we-widget='heading']"), 20000);
        const title = () => Array.from(doc.querySelectorAll("[data-we-widget='heading']")).find((n) => (n.textContent || "").includes("Heading"));
        const display = () => doc.querySelector("[data-we-widget='display-heading']");
        const displayWithSubtitle = () => doc.querySelector("[data-we-widget='display-heading-with-subtitle']");
        const lead = () => doc.querySelector("[data-we-widget='lead']");
        H.assertEqual((title().textContent || "").trim(), "Parity Heading", "initial parity heading text");
        H.assertEqual((display().textContent || "").trim(), "Parity Display", "initial parity display heading text");
        H.assertTrue(!!displayWithSubtitle(), "parity display-heading-with-subtitle node present");
        H.assertEqual((lead().textContent || "").trim(), "Parity lead text", "initial parity lead text");
        Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "set-title").click();
        await H.sleep(80);
        H.assertEqual((title().textContent || "").trim(), "Parity Updated Heading", "updated parity heading text");
        H.setStatus("PASS\nparity heading/display-heading/lead render and update", "pass");
      } catch (err) {
        console.error(err);
        H.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
