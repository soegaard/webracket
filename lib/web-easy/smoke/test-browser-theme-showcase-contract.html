<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy theme showcase contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 700px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running theme showcase contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-theme-showcase.html" title="web-easy theme showcase contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }
    function frameDocFrom(frame) { return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document); }
    function assertTrue(v, label) { if (!v) throw new Error(label + ": expected true, got false"); }
    function linkIndex(doc, id) {
      return Array.from(doc.querySelectorAll("link")).findIndex((el) => el.id === id);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const themeSel = frameDoc.querySelector("select");
          const menu = frameDoc.querySelector("[data-we-widget='menu-bar']");
          const tabs = frameDoc.querySelector("[data-we-widget='tab-panel']");
          const toast = frameDoc.querySelector("[data-we-widget='toast']");
          const table = frameDoc.querySelector("[data-we-widget='table']");
          if (themeSel && menu && tabs && toast && table) {
            return { frameDoc, themeSel, menu, tabs, toast, table };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for theme showcase contract UI");
    }

    async function waitForThemeTokens(doc, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const rootStyle = getComputedStyle(doc.documentElement);
        const weBg = (rootStyle.getPropertyValue("--we-bg") || "").trim();
        if (weBg.length > 0) return;
        await sleep(25);
      }
      throw new Error("Timed out waiting for theme tokens");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 30000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 30000);
        assertTrue(!!ui.menu, "menu widget present");
        assertTrue(!!ui.tabs, "tab-panel widget present");
        assertTrue(!!ui.toast, "toast widget present");
        assertTrue(!!ui.table, "table widget present");

        await waitForThemeTokens(ui.frameDoc, 10000);

        const coreIdx = linkIndex(ui.frameDoc, "we-theme-core-css");
        const extIdx = linkIndex(ui.frameDoc, "we-theme-external-css");
        const showcaseIdx = linkIndex(ui.frameDoc, "we-theme-showcase-css");
        assertTrue(coreIdx >= 0, "core link exists");
        assertTrue(extIdx >= 0, "external theme link exists");
        assertTrue(coreIdx < extIdx, "core link is before external theme link");
        if (showcaseIdx >= 0) {
          assertTrue(extIdx < showcaseIdx, "external theme link is before showcase link");
        }

        // Graceful iframe teardown: blank before dashboard removes iframe node.
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out unloading iframe")), 5000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
          frame.src = "about:blank";
        });

        setStatus("PASS\ntheme showcase contract: key widgets + theme tokens present", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
