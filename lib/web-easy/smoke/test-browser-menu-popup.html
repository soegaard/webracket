<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy menu popup smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 240px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser menu-popup assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-popup" title="web-easy menu-popup smoke app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=menu-popup",
          (d) => Array.from(d.querySelectorAll("button"))
            .some((b) => (b.textContent || "").trim() === "open-popup"),
          20000
        );

        const openButton = Array.from(doc.querySelectorAll("button"))
          .find((b) => (b.textContent || "").trim() === "open-popup");
        H.assertTrue(!!openButton, "open-popup button present");
        H.assertTrue(H.bodyText(doc).includes("status:idle"), "status idle before open");

        openButton.click();

        await H.waitForCondition("menu-popup mount", 20000, function () {
          return !!doc.getElementById("popup-menu");
        });

        const popup = doc.getElementById("popup-menu");
        H.assertTrue(!!popup, "popup mounted");

        await H.waitForCondition("menu-popup active element", 20000, function () {
          return doc.activeElement === popup;
        });

        H.assertEqual(doc.activeElement, popup, "popup gets autofocus when opened");

        const items = () => Array.from(doc.querySelectorAll('.we-menu-item[role="menuitem"]'));
        H.assertEqual(items().length, 2, "popup exposes two menu items");

        H.dispatchKey(popup, "ArrowDown");
        await H.waitForCondition("menu-popup ArrowDown entry", 20000, function () {
          return doc.activeElement === items()[0];
        });
        H.assertEqual(doc.activeElement, items()[0], "ArrowDown from popup focuses first item");

        H.dispatchKey(items()[0], "ArrowDown");
        await H.waitForCondition("menu-item ArrowDown next", 20000, function () {
          return doc.activeElement === items()[1];
        });
        H.assertEqual(doc.activeElement, items()[1], "ArrowDown from first item focuses second item");

        H.dispatchKey(items()[1], "ArrowUp");
        await H.waitForCondition("menu-item ArrowUp prev", 20000, function () {
          return doc.activeElement === items()[0];
        });
        H.assertEqual(doc.activeElement, items()[0], "ArrowUp from second item focuses first item");

        H.dispatchKey(popup, "Escape");
        await H.waitForCondition("menu-popup escape close", 20000, function () {
          return H.bodyText(doc).includes("status:escape");
        });

        H.assertTrue(!doc.getElementById("popup-menu"), "popup closes on Escape");
        H.setStatus("PASS\nmenu-popup enters roving focus with ArrowDown", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus(
          "FAIL\n" + (err && err.message ? err.message : String(err)),
          "fail"
        );
      }
    })();
  </script>
</body>
</html>
