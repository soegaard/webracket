<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy solar2 indicators contract</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 900px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running solar2 indicators contract...</div>
  <iframe id="app-frame" src="./generated/example-browser-solar-showcase.html" title="solar2 indicators contract"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

    function assertTrue(v, label) {
      if (!v) throw new Error(label + ": expected true, got false");
    }

    function assertEqual(got, want, label) {
      if (got !== want) throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (doc && doc.querySelector("#solar2-indicators-section")) return doc;
        await sleep(25);
      }
      throw new Error("Timed out waiting for indicators section");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
        });

        const doc = await waitForUI(frame, 20000);
        const root = doc.querySelector("#solar2-indicators-section");
        const alerts = Array.from(root.querySelectorAll(".we-alert"));
        const alertTitles = Array.from(root.querySelectorAll(".we-alert .we-alert-title"));
        const badges = Array.from(root.querySelectorAll(".we-badge"));

        assertTrue(alerts.length >= 7, "alert count");
        assertTrue(alertTitles.length >= 7, "rich alert title count");
        assertEqual(badges.length, 16, "badge count across two rows");

        const squareRow = root.querySelector(".showcase-badge-row-square");
        const pillRow = root.querySelector(".showcase-badge-row-pill");
        assertTrue(!!squareRow && !!pillRow, "badge rows present");
        assertEqual(squareRow.querySelectorAll(".we-badge").length, 8, "square row badge count");
        assertEqual(pillRow.querySelectorAll(".we-badge").length, 8, "pill row badge count");

        const primaryBadge = root.querySelector(".we-badge.we-badge-primary");
        const lightBadge = root.querySelector(".we-badge.we-badge-light");
        assertTrue(!!primaryBadge && !!lightBadge, "badge variants present");
        assertTrue((primaryBadge.getAttribute("class") || "").includes("we-badge-primary"),
                   "primary badge class applied");
        assertTrue((lightBadge.getAttribute("class") || "").includes("we-badge-light"),
                   "light badge class applied");

        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out unloading iframe")), 5000);
          frame.addEventListener("load", () => { clearTimeout(timer); resolve(); }, { once: true });
          frame.src = "about:blank";
        });

        setStatus(
          "PASS\n" +
          "alerts: section present with expected count\n" +
          "badges: two rows (square + pill) and variant colors verified",
          "pass"
        );
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
