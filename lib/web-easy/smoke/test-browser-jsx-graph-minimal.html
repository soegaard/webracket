<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy JSXGraph minimal smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 380px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running JSXGraph minimal smoke assertions...</div>
  <iframe id="app-frame" src="./generated/jsx-graph-minimal.html" title="web-easy JSXGraph minimal app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    async function waitForReady(frame, timeoutMs) {
      const start = Date.now();
      let lastBody = "";
      let lastStatus = "";
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        const frameWin = frame.contentWindow;
        if (frameDoc) {
          lastBody = (frameDoc.body && frameDoc.body.textContent) ? frameDoc.body.textContent : "";
        }
        if (frameWin) {
          lastStatus = String(frameWin.status || "");
          if (lastStatus.includes("Board ready.")) {
            return frameWin;
          }
          if (lastBody.includes("Board ready.")) {
            return frameDoc;
          }
        }
        await sleep(25);
      }
      throw new Error(
        "Timed out waiting for JSXGraph minimal board to initialize\n" +
        "body=" + JSON.stringify(lastBody) + "\n" +
        "status=" + JSON.stringify(lastStatus)
      );
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const frameDoc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (!frameDoc) {
          throw new Error("No iframe document");
        }

        await waitForReady(frame, 20000);
        const readyFrameDoc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (!readyFrameDoc) {
          throw new Error("No iframe document after board readiness");
        }
        const text = (readyFrameDoc.body && readyFrameDoc.body.textContent) ? readyFrameDoc.body.textContent : "";
        if (!text.includes("PQRefresh boardBoard ready.")) {
          throw new Error("Board did not report the expected point labels: " + text);
        }
        setStatus("PASS\nstatus=Board ready. points=P,Q.", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
