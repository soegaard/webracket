<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser list-group smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 240px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser list-group smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=list-group" title="web-easy list-group smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const root = frameDoc.querySelector("[data-we-widget='list-group']");
          const alpha = Array.from(frameDoc.querySelectorAll("[data-we-widget='list-group-item']"))
            .find((e) => e.textContent.trim() === "Alpha");
          const beta = Array.from(frameDoc.querySelectorAll("[data-we-widget='list-group-item']"))
            .find((e) => e.textContent.trim() === "Beta");
          if (root && alpha && beta) {
            return { frameDoc, root, alpha, beta };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for list-group smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(ui.beta.getAttribute("class"), "we-list-group-item is-current", "initial current item class");

        ui.alpha.click();
        await sleep(100);

        const alphaAfter = Array.from(ui.frameDoc.querySelectorAll("[data-we-widget='list-group-item']"))
          .find((e) => e.textContent.trim() === "Alpha");
        const betaAfter = Array.from(ui.frameDoc.querySelectorAll("[data-we-widget='list-group-item']"))
          .find((e) => e.textContent.trim() === "Beta");

        assertEqual(alphaAfter.getAttribute("class"), "we-list-group-item is-current", "alpha current class after click");
        assertEqual(betaAfter.getAttribute("class"), "we-list-group-item", "beta non-current class after click");
        setStatus("PASS\nlist-group updates current item", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
