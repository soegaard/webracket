<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy progress contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 280px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running progress contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=progress" title="web-easy progress contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=progress", (d) => !!d.querySelector("[data-we-widget='progress'].we-progress"), 20000);
        H.assertNoForbiddenAttrTokens(doc, "progress-contract");
        H.assertNoInlineWidgetStyles(doc, "progress-contract");
        const progress = doc.querySelector("[data-we-widget='progress'].we-progress");
        const warnButton = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "warning");
        const errorButton = Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "danger");
        H.assertTrue((progress.className || "").includes("we-progress-info"), "initial progress class info");
        warnButton.click();
        await H.sleep(100);
        H.assertTrue((progress.className || "").includes("we-progress-warning"), "progress class after warning");
        errorButton.click();
        await H.sleep(100);
        H.assertTrue((progress.className || "").includes("we-progress-danger"), "progress class after danger");
        H.setStatus("PASS\nprogress contract: data-we-widget + variant class transitions", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
