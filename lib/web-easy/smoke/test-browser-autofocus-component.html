<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy autofocus component smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 220px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser autofocus component assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=autofocus-component" title="web-easy autofocus component smoke app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=autofocus-component",
          (d) => Array.from(d.querySelectorAll("button"))
            .some((b) => (b.textContent || "").trim() === "open-component-editor"),
          20000
        );

        const openButton = Array.from(doc.querySelectorAll("button"))
          .find((b) => (b.textContent || "").trim() === "open-component-editor");
        H.assertTrue(!!openButton, "open-component-editor button present");
        H.assertTrue(H.bodyText(doc).includes("status:idle"), "status idle before open");

        openButton.focus();
        openButton.click();

        await H.waitForCondition("autofocus component mount", 20000, function () {
          return !!doc.getElementById("autofocus-component-root");
        });

        const root = doc.getElementById("autofocus-component-root");
        H.assertTrue(!!root, "autofocus component root mounted");

        await H.waitForCondition("autofocus component active element", 20000, function () {
          return doc.activeElement === root;
        });

        H.assertEqual(doc.activeElement, root, "autofocus moves focus to mounted component root");
        H.assertTrue(H.bodyText(doc).includes("status:open"), "status stays open after component mount");
        H.setStatus("PASS\nautofocus forwards through component root on dynamic mount", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus(
          "FAIL\n" + (err && err.message ? err.message : String(err)),
          "fail"
        );
      }
    })();
  </script>
</body>
</html>
