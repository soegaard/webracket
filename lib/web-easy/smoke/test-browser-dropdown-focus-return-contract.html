<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy dropdown focus-return contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running dropdown focus-return contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=dropdown" title="web-easy dropdown focus-return contract app"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(
          frame,
          "./generated/example-browser-smoke-all.html?test=dropdown",
          (d) => !!d.querySelector("[data-we-widget='menu-label']"),
          20000
        );

        H.assertNoForbiddenAttrTokens(doc, "dropdown-focus-return");
        H.assertNoInlineWidgetStyles(doc, "dropdown-focus-return");

        const trigger = doc.querySelector("[data-we-widget='menu-label']");
        trigger.focus();
        H.dispatchKey(trigger, "Enter");
        await H.sleep(100);
        H.assertEqual(trigger.getAttribute("aria-expanded"), "true", "dropdown opened with Enter");

        H.dispatchKey(trigger, "Escape");
        await H.sleep(100);
        H.assertEqual(trigger.getAttribute("aria-expanded"), "false", "dropdown closed with Escape");
        H.assertTrue(doc.activeElement === trigger, "focus returns to trigger on Escape close");

        H.setStatus("PASS\ndropdown focus-return contract: trigger regains focus on Escape close", "pass");
      } catch (err) {
        console.error(err);
        window.SmokeHarness.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
