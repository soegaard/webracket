<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy menu stress contract smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running menu stress contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-full" title="web-easy menu stress contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function dispatchKey(el, key) {
      el.dispatchEvent(new KeyboardEvent("keydown", { key, bubbles: true }));
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frameDocFrom(frame);
        if (doc) {
          const labels = Array.from(doc.querySelectorAll(".we-menu-label[role='button']"));
          const firstLabel = labels[0] || null;
          const firstItem = doc.querySelector(".we-menu-item[role='menuitem']");
          if (firstLabel && firstItem) {
            return { doc, firstLabel, firstItem };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for menu stress contract UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const { firstLabel, firstItem } = ui;

        firstLabel.focus();
        dispatchKey(firstLabel, "ArrowDown");
        await sleep(60);
        assertTrue(firstLabel.getAttribute("aria-expanded") === "true", "menu opens before stress loop");

        let i = 0;
        while (i < 60) {
          dispatchKey(firstItem, "ArrowDown");
          dispatchKey(firstItem, "ArrowUp");
          if ((i % 10) === 0) {
            await sleep(10);
          }
          i += 1;
        }

        assertTrue(firstLabel.getAttribute("aria-expanded") === "true", "menu remains open after arrow stress");

        dispatchKey(firstItem, "Escape");
        await sleep(60);
        assertTrue(firstLabel.getAttribute("aria-expanded") === "false", "menu closes after Escape");

        setStatus("PASS\nmenu stress contract: repeated ArrowUp/ArrowDown remains stable", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
