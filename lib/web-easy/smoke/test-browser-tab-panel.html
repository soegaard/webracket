<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser tab-panel smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 260px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser tab-panel smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=tab-panel" title="web-easy tab-panel smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const buttons = frameDoc.querySelectorAll("button");
          const text = frameDoc.body ? frameDoc.body.textContent || "" : "";
          if (buttons.length >= 3 && text.includes("Info tab")) {
            return { frameDoc, buttons };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for tab-panel smoke UI");
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    function hasText(frameDoc, token) {
      const text = frameDoc.body ? frameDoc.body.textContent || "" : "";
      return text.includes(token);
    }

    function selectedButtons(frameDoc) {
      return Array.from(frameDoc.querySelectorAll("button[aria-selected='true']"));
    }

    function hasSelectedClass(frameDoc) {
      const selected = selectedButtons(frameDoc);
      if (selected.length !== 1) {
        return false;
      }
      const cls = selected[0].getAttribute("class") || "";
      return cls.includes("is-selected");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(hasText(ui.frameDoc, "Info tab"), true, "initial tab text Info");
        assertEqual(selectedButtons(ui.frameDoc).length, 1, "initial selected header count");
        assertEqual(selectedButtons(ui.frameDoc)[0].textContent.trim(), "info", "initial selected header label");
        assertEqual(hasSelectedClass(ui.frameDoc), true, "initial selected header class");

        ui.buttons[1].click();
        await sleep(100);
        assertEqual(hasText(ui.frameDoc, "Settings tab"), true, "tab text after first click Settings");
        assertEqual(selectedButtons(ui.frameDoc).length, 1, "selected header count after click Settings");
        assertEqual(selectedButtons(ui.frameDoc)[0].textContent.trim(), "settings", "selected header label after click Settings");
        assertEqual(hasSelectedClass(ui.frameDoc), true, "selected header class after click Settings");

        ui.buttons[1].dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
        await sleep(100);
        assertEqual(hasText(ui.frameDoc, "About tab"), true, "tab text after ArrowRight About");
        assertEqual(selectedButtons(ui.frameDoc).length, 1, "selected header count after ArrowRight");
        assertEqual(selectedButtons(ui.frameDoc)[0].textContent.trim(), "about", "selected header label after ArrowRight");
        assertEqual(hasSelectedClass(ui.frameDoc), true, "selected header class after ArrowRight");

        ui.buttons[2].dispatchEvent(new KeyboardEvent("keydown", { key: "Home", bubbles: true }));
        await sleep(100);
        assertEqual(hasText(ui.frameDoc, "Info tab"), true, "tab text after Home Info");
        assertEqual(selectedButtons(ui.frameDoc).length, 1, "selected header count after Home");
        assertEqual(selectedButtons(ui.frameDoc)[0].textContent.trim(), "info", "selected header label after Home");
        assertEqual(hasSelectedClass(ui.frameDoc), true, "selected header class after Home");

        setStatus("PASS\ninitial=Info; click-Settings; key-ArrowRight=About; key-Home=Info", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
