<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy parity keyboard contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running parity keyboard-only contract assertions...</div>
  <iframe id="app-frame" src="about:blank" title="web-easy parity keyboard contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function currentTextByPrefix(frameDoc, prefix) {
      const node = Array.from(frameDoc.querySelectorAll("[data-we-widget='text']"))
        .find((el) => (el.textContent || "").trim().startsWith(prefix));
      return node ? (node.textContent || "").trim() : "";
    }

    async function waitForCondition(label, timeoutMs, pred) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        if (pred()) {
          return;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for " + label);
    }

    async function loadCase(frame, src, readyFn, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe: " + src)), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = src;
      });

      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc && readyFn(frameDoc)) {
          return frameDoc;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for ready state: " + src);
    }

    function menuItemByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-item[role="menuitem"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function menuLabelByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function tabByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('button[role="tab"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function selectedTabLabel(frameDoc) {
      const selected = frameDoc.querySelector("button[role='tab'][aria-selected='true']");
      return selected ? (selected.textContent || "").trim() : "";
    }

    function scrollspyItemByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll(".we-scrollspy-item"))
        .find((el) => (el.textContent || "").trim() === label);
    }

    async function checkMenuKeyboardOnly(frame, timeoutMs) {
      const frameDoc = await loadCase(
        frame,
        "./generated/example-browser-parity-all.html?test=parity-menu-full",
        (d) => d.querySelectorAll('.we-menu-item[role="menuitem"]').length >= 4 && bodyText(d).includes("status:ready"),
        timeoutMs
      );

      const projectLabel = menuLabelByText(frameDoc, "Project");
      const helpLabel = menuLabelByText(frameDoc, "Help");
      const buildItem = menuItemByText(frameDoc, "build");
      const deployItem = menuItemByText(frameDoc, "deploy");
      assertTrue(!!projectLabel && !!helpLabel && !!buildItem && !!deployItem, "parity menu nodes present");

      projectLabel.focus();
      await sleep(40);
      projectLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
      await sleep(60);
      assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "Enter opens Project menu");

      projectLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowDown", bubbles: true }));
      await sleep(60);
      assertTrue(frameDoc.activeElement === buildItem, "ArrowDown focuses first parity item");

      buildItem.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
      await sleep(60);
      assertTrue(helpLabel.getAttribute("aria-expanded") === "true", "ArrowRight switches/open Help");
      assertTrue(frameDoc.activeElement === helpLabel, "ArrowRight moves focus to Help");

      helpLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowLeft", bubbles: true }));
      await sleep(60);
      assertTrue(projectLabel.getAttribute("aria-expanded") === "true", "ArrowLeft switches/open Project");
      assertTrue(frameDoc.activeElement === projectLabel, "ArrowLeft moves focus back to Project");

      projectLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "d", bubbles: true }));
      await sleep(60);
      assertTrue(frameDoc.activeElement === deployItem, "type-ahead d focuses deploy");

      deployItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter", bubbles: true }));
      await sleep(80);
      assertTrue(bodyText(frameDoc).includes("status:deploy"), "Enter on deploy invokes action");

      deployItem.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
      await sleep(60);
      assertTrue(projectLabel.getAttribute("aria-expanded") === "false", "Escape closes parity menu");
      assertTrue(frameDoc.activeElement === projectLabel, "Escape returns focus to Project label");
    }

    async function checkTabsKeyboardOnly(frame, timeoutMs) {
      const frameDoc = await loadCase(
        frame,
        "./generated/example-browser-parity-all.html?test=parity-tabs",
        (d) => d.querySelectorAll('button[role="tab"]').length >= 3,
        timeoutMs
      );

      const overviewTab = tabByText(frameDoc, "overview");
      assertTrue(!!overviewTab, "overview tab present");
      overviewTab.focus();
      await sleep(40);
      assertTrue(selectedTabLabel(frameDoc) === "overview", "initial selected parity tab is overview");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "details", "ArrowRight selects details");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "End", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "help", "End selects help");

      frameDoc.activeElement.dispatchEvent(new KeyboardEvent("keydown", { key: "Home", bubbles: true }));
      await sleep(80);
      assertTrue(selectedTabLabel(frameDoc) === "overview", "Home selects overview");
    }

    async function checkScrollspyKeyboardOnly(frame, timeoutMs) {
      const frameDoc = await loadCase(
        frame,
        "./generated/example-browser-parity-all.html?test=parity-scrollspy",
        (d) => d.querySelectorAll(".we-scrollspy-item").length >= 3,
        timeoutMs
      );

      const docsItem = scrollspyItemByText(frameDoc, "Docs");
      const homeItem = scrollspyItemByText(frameDoc, "Home");
      const faqItem  = scrollspyItemByText(frameDoc, "FAQ");
      assertTrue(!!docsItem, "parity scrollspy docs item present");
      assertTrue(!!homeItem, "parity scrollspy home item present");
      assertTrue(!!faqItem, "parity scrollspy faq item present");
      docsItem.click();
      await waitForCondition("parity scrollspy baseline docs", 2000, () => currentTextByPrefix(frameDoc, "parity-current:") === "parity-current:docs");
      const docsNow = scrollspyItemByText(frameDoc, "Docs");
      assertTrue(!!docsNow, "parity scrollspy docs item after baseline present");
      docsNow.focus();
      await sleep(40);

      docsNow.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
      await waitForCondition("parity scrollspy current faq", 2000, () => currentTextByPrefix(frameDoc, "parity-current:") === "parity-current:faq");

    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        const timeoutMs = 20000;
        await checkMenuKeyboardOnly(frame, timeoutMs);
        await checkTabsKeyboardOnly(frame, timeoutMs);
        setStatus("PASS\nparity keyboard contract: menu + tabs keyboard-only flow", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: body=" + JSON.stringify(bodyText(frameDoc).slice(0, 240)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
