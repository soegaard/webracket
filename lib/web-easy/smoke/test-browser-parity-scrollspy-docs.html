<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>web-easy parity scrollspy docs smoke test</title><style>body{font-family:monospace;margin:16px}#status{white-space:pre-wrap;padding:8px;border:1px solid #999;margin-bottom:12px}#status.pass{color:#0a6a0a;border-color:#0a6a0a}#status.fail{color:#8a1111;border-color:#8a1111}#app-frame{width:100%;height:360px;border:1px solid #999}</style></head><body><div id="status">Running parity scrollspy docs smoke assertions...</div><iframe id="app-frame" src="./generated/example-browser-parity-all.html?test=parity-scrollspy-docs"></iframe><script>
function setStatus(t,c){const s=document.getElementById('status');s.textContent=t;s.className=c;} function sleep(ms){return new Promise((r)=>setTimeout(r,ms));}
function frameDocFrom(f){return f.contentDocument||(f.contentWindow&&f.contentWindow.document);} function assertEqual(g,w,l){if(g!==w)throw new Error(l+': expected '+JSON.stringify(w)+', got '+JSON.stringify(g));} function assertTrue(v,l){if(!v)throw new Error(l+': expected true, got false');}
async function waitForUI(frame,timeoutMs){const start=Date.now();while(Date.now()-start<timeoutMs){const d=frameDocFrom(frame);if(d){const theming=[...d.querySelectorAll("[data-we-widget='scrollspy-item']")].find(n=>n.textContent.trim()==='Theming');const txt=[...d.querySelectorAll("[data-we-widget='text']")].find(n=>n.textContent.trim().startsWith('parity-docs-current:'));if(theming&&txt)return{d,theming,txt};}await sleep(25);}throw new Error('Timed out waiting for parity scrollspy docs smoke UI');}
(async()=>{try{const f=document.getElementById('app-frame');await new Promise((res,rej)=>{const t=setTimeout(()=>rej(new Error('Timed out loading iframe')),2e4);f.addEventListener('load',()=>{clearTimeout(t);res();},{once:true});});const ui=await waitForUI(f,2e4);ui.theming.click();await sleep(80);const txtAfter=[...ui.d.querySelectorAll("[data-we-widget='text']")].find(n=>n.textContent.trim().startsWith('parity-docs-current:'));const after=txtAfter.textContent.trim();assertTrue(after==='parity-docs-current:migration'||after==='parity-docs-current:theming','parity docs current id after click');setStatus('PASS\nparity scrollspy docs TOC updates current section','pass');}catch(err){console.error(err);setStatus('FAIL\n'+(err&&err.message?err.message:String(err)),'fail');}})();
</script></body></html>
