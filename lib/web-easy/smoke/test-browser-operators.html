<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy browser operators smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 240px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running browser operators smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=operators" title="web-easy operators smoke app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertEqual(got, want, label) {
      if (got !== want) {
        throw new Error(label + ": expected " + JSON.stringify(want) + ", got " + JSON.stringify(got));
      }
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const button = frameDoc.querySelector("button");
          const text = bodyText(frameDoc);
          if (button && text.includes("count:0") && text.includes("even:0")) {
            return { frameDoc, button };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for operators smoke UI");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        assertEqual(bodyText(ui.frameDoc).includes("count:0"), true, "initial count text contains 0");
        assertEqual(bodyText(ui.frameDoc).includes("even:0"), true, "initial even text contains 0");

        ui.button.click();
        await sleep(100);
        assertEqual(bodyText(ui.frameDoc).includes("count:1"), true, "count after first click contains 1");
        assertEqual(bodyText(ui.frameDoc).includes("even:0"), true, "even after first click remains 0");

        ui.button.click();
        await sleep(100);
        assertEqual(bodyText(ui.frameDoc).includes("count:2"), true, "count after second click contains 2");
        assertEqual(bodyText(ui.frameDoc).includes("even:2"), true, "even after second click contains 2");

        setStatus("PASS\ncount: 0->1->2; even(~#>): 0->0->2; λ<~ increment works", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
