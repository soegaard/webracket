<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy hero smoke test</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 320px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running hero smoke assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=hero"></iframe>
  <script src="./smoke-harness.js"></script>
  <script>
    (async function run() {
      const H = window.SmokeHarness;
      try {
        const frame = document.getElementById("app-frame");
        const doc = await H.loadCase(frame, "./generated/example-browser-smoke-all.html?test=hero", (d) => !!d.querySelector("[data-we-widget='heading-with-subtitle']"), 20000);
        const statusNode = () => Array.from(doc.querySelectorAll("[data-we-widget='text']")).find((n) => (n.textContent || "").trim().startsWith("status:"));
        H.assertEqual((statusNode().textContent || "").trim(), "status:All systems nominal", "initial hero status");
        Array.from(doc.querySelectorAll("button")).find((b) => (b.textContent || "").trim() === "mark-warn").click();
        await H.sleep(80);
        H.assertEqual((statusNode().textContent || "").trim(), "status:Investigating elevated error rate", "status after mark-warn");
        H.setStatus("PASS\nhero page composition renders and updates", "pass");
      } catch (err) {
        console.error(err);
        H.setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
