<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy menu aria state-transition contract smoke test</title>
  <style>
    body {
      font-family: monospace;
      margin: 16px;
    }
    #status {
      white-space: pre-wrap;
      padding: 8px;
      border: 1px solid #999;
      margin-bottom: 12px;
    }
    #status.pass {
      color: #0a6a0a;
      border-color: #0a6a0a;
    }
    #status.fail {
      color: #8a1111;
      border-color: #8a1111;
    }
    #app-frame {
      width: 100%;
      height: 320px;
      border: 1px solid #999;
    }
  </style>
</head>
<body>
  <div id="status">Running menu aria state-transition contract assertions...</div>
  <iframe id="app-frame" src="./generated/example-browser-smoke-all.html?test=menu-full" title="web-easy menu aria state-transition contract app"></iframe>

  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function frameDocFrom(frame) {
      return frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
    }

    function bodyText(frameDoc) {
      return frameDoc && frameDoc.body ? frameDoc.body.textContent || "" : "";
    }

    function assertTrue(v, label) {
      if (!v) {
        throw new Error(label + ": expected true, got false");
      }
    }

    function menuLabelByText(frameDoc, label) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .find((el) => (el.textContent || "").trim() === label);
    }

    function expandedLabels(frameDoc) {
      return Array.from(frameDoc.querySelectorAll('.we-menu-label[role="button"]'))
        .filter((el) => el.getAttribute("aria-expanded") === "true");
    }

    function popupFromLabel(frameDoc, labelNode) {
      const controls = labelNode.getAttribute("aria-controls");
      return controls ? frameDoc.getElementById(controls) : null;
    }

    async function waitForUI(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const frameDoc = frameDocFrom(frame);
        if (frameDoc) {
          const fileLabel = menuLabelByText(frameDoc, "File");
          const editLabel = menuLabelByText(frameDoc, "Edit");
          if (fileLabel && editLabel) {
            return { frameDoc, fileLabel, editLabel };
          }
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for menu aria state contract UI");
    }

    function assertStableAriaLink(frameDoc, label, labelName) {
      const popup = popupFromLabel(frameDoc, label);
      assertTrue(!!popup, labelName + " aria-controls resolves popup");
      assertTrue(popup.getAttribute("role") === "menu", labelName + " controlled popup role remains menu");
    }

    (async function run() {
      try {
        const frame = document.getElementById("app-frame");
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 20000);
          frame.addEventListener("load", () => {
            clearTimeout(timer);
            resolve();
          }, { once: true });
        });

        const ui = await waitForUI(frame, 20000);
        const { frameDoc, fileLabel, editLabel } = ui;

        assertStableAriaLink(frameDoc, fileLabel, "File");
        assertStableAriaLink(frameDoc, editLabel, "Edit");
        assertTrue(expandedLabels(frameDoc).length === 0, "initially no expanded label");

        fileLabel.click();
        await sleep(60);
        assertTrue(fileLabel.getAttribute("aria-expanded") === "true", "File expanded after click");
        assertTrue(expandedLabels(frameDoc).length === 1, "only one expanded label after File click");
        assertStableAriaLink(frameDoc, fileLabel, "File");

        fileLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "ArrowRight", bubbles: true }));
        await sleep(60);
        assertTrue(fileLabel.getAttribute("aria-expanded") === "false", "File collapsed after switch");
        assertTrue(editLabel.getAttribute("aria-expanded") === "true", "Edit expanded after switch");
        assertTrue(expandedLabels(frameDoc).length === 1, "only one expanded label after ArrowRight switch");
        assertStableAriaLink(frameDoc, editLabel, "Edit");

        fileLabel.dispatchEvent(new MouseEvent("mouseenter", { bubbles: true }));
        await sleep(60);
        assertTrue(fileLabel.getAttribute("aria-expanded") === "true", "File expanded after hover switch");
        assertTrue(editLabel.getAttribute("aria-expanded") === "false", "Edit collapsed after hover switch");
        assertTrue(expandedLabels(frameDoc).length === 1, "only one expanded label after hover switch");

        fileLabel.dispatchEvent(new KeyboardEvent("keydown", { key: "Escape", bubbles: true }));
        await sleep(60);
        assertTrue(fileLabel.getAttribute("aria-expanded") === "false", "File collapsed after Escape");
        assertTrue(editLabel.getAttribute("aria-expanded") === "false", "Edit collapsed after Escape");
        assertTrue(expandedLabels(frameDoc).length === 0, "no expanded labels after Escape");
        assertStableAriaLink(frameDoc, fileLabel, "File");
        assertStableAriaLink(frameDoc, editLabel, "Edit");

        setStatus("PASS\nmenu aria state contract: expanded/controls/menu-role transitions", "pass");
      } catch (err) {
        console.error(err);
        const frame = document.getElementById("app-frame");
        const frameDoc = frameDocFrom(frame);
        const diag = frameDoc
          ? ("diag: expanded=" + expandedLabels(frameDoc).length +
             " body=" + JSON.stringify(bodyText(frameDoc).slice(0, 260)))
          : "diag: no frame document";
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)) + "\n" + diag, "fail");
      }
    })();
  </script>
</body>
</html>
