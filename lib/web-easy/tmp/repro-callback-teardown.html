<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>web-easy callback teardown repro</title>
  <style>
    body { font-family: monospace; margin: 16px; }
    #status { white-space: pre-wrap; padding: 8px; border: 1px solid #999; margin-bottom: 12px; }
    #status.pass { color: #0a6a0a; border-color: #0a6a0a; }
    #status.fail { color: #8a1111; border-color: #8a1111; }
    #app-frame { width: 100%; height: 400px; border: 1px solid #999; }
  </style>
</head>
<body>
  <div id="status">Running callback teardown repro...</div>
  <iframe id="app-frame"></iframe>
  <script>
    function setStatus(text, cls) {
      const status = document.getElementById("status");
      status.textContent = text;
      status.className = cls;
    }
    function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

    let uncaught = [];
    window.addEventListener("error", (evt) => {
      uncaught.push(String(evt.error && evt.error.message ? evt.error.message : evt.message || "unknown error"));
    });
    window.addEventListener("unhandledrejection", (evt) => {
      const reason = evt && evt.reason ? evt.reason : "unknown rejection";
      uncaught.push(String(reason && reason.message ? reason.message : reason));
    });

    async function waitForWidget(frame, timeoutMs) {
      const start = Date.now();
      while (Date.now() - start < timeoutMs) {
        const doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
        if (doc) {
          const marker = doc.querySelector("[data-we-widget='navigation-bar']");
          if (marker) return doc;
        }
        await sleep(25);
      }
      throw new Error("Timed out waiting for iframe widget");
    }

    async function unloadFrame(frame, timeoutMs) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out unloading iframe")), timeoutMs);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = "about:blank";
      });
      frame.remove();
    }

    async function loadOne(frame, url) {
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => reject(new Error("Timed out loading iframe")), 30000);
        frame.addEventListener("load", () => {
          clearTimeout(timer);
          resolve();
        }, { once: true });
        frame.src = url;
      });
      await waitForWidget(frame, 30000);
    }

    (async function run() {
      try {
        const url = "../smoke/generated/example-browser-solar-showcase.html";
        let i = 0;
        while (i < 8) {
          const frame = document.getElementById("app-frame");
          await loadOne(frame, url);
          await unloadFrame(frame, 5000);
          if (i < 7) {
            const next = document.createElement("iframe");
            next.id = "app-frame";
            next.style.width = "100%";
            next.style.height = "400px";
            next.style.border = "1px solid #999";
            document.body.appendChild(next);
          }
          i = i + 1;
        }
        await sleep(500);
        if (uncaught.length > 0) {
          throw new Error("Uncaught errors: " + uncaught.join(" | "));
        }
        setStatus("PASS\n8x load/unload cycles without uncaught callback errors", "pass");
      } catch (err) {
        console.error(err);
        setStatus("FAIL\n" + (err && err.message ? err.message : String(err)), "fail");
      }
    })();
  </script>
</body>
</html>
