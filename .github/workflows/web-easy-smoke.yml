name: web-easy-smoke

on:
  push:
    paths:
      - "lib/web-easy/**"
      - ".github/workflows/web-easy-smoke.yml"
  pull_request:
    paths:
      - "lib/web-easy/**"
      - ".github/workflows/web-easy-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Ensure raco static-web
        run: |
          raco pkg install --auto --skip-installed raco-static-web
          raco static-web --help >/dev/null

      - name: Run web-easy non-headless smoke checks
        run: |
          cd lib/web-easy/smoke
          ./check-all.sh
