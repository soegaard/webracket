name: web-easy-smoke

on:
  push:
    paths:
      - "lib/web-easy/**"
      - ".github/workflows/web-easy-smoke.yml"
  pull_request:
    paths:
      - "lib/web-easy/**"
      - ".github/workflows/web-easy-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Ensure raco static-web
        run: |
          raco pkg install --auto --skip-installed --no-docs raco-static-web
          raco static-web --help >/dev/null

      - name: Link local webracket collection
        run: raco link "$GITHUB_WORKSPACE"

      - name: Run web-easy non-headless smoke checks
        run: |
          cd lib/web-easy/smoke
          echo "[1/3] core tests (real Racket)"
          racket ../test-web-easy.rkt

          echo "[2/3] core tests (webracket -r)"
          WEBRACKET_OUT="$(cd .. && racket ../../webracket.rkt -r test-web-easy-run.rkt)"
          if [ -n "$WEBRACKET_OUT" ] && [ "$WEBRACKET_OUT" != "#<void>" ]; then
            printf '%s\n' "$WEBRACKET_OUT"
          fi
          echo "web-easy webracket tests passed"

          echo "[3/3] smoke compile"
          ./check-smoke.sh
