name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "scribblings/**"
      - "web-site/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Install Scribble tools
        run: raco pkg install --auto --skip-installed --no-docs scribble-tools

      - name: Link local webracket collection
        run: raco link "$GITHUB_WORKSPACE"

      - name: Render WebRacket manual
        run: raco scribble --htmls --dest html scribblings/webracket.scrbl

      - name: Publish manual under /webracket/
        run: |
          rm -rf web-site/public/webracket
          mkdir -p web-site/public/webracket
          cp -R html/webracket/. web-site/public/webracket/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
