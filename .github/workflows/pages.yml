name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "scribblings/**"
      - "lib/web-easy/**"
      - "compiler.rkt"
      - "primitives.rkt"
      - "runtime-wasm.rkt"
      - "webracket.rkt"
      - "web-site/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WASM_TOOLS_VERSION: "1.225.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Install Scribble tools
        run: raco pkg install --auto --skip-installed --no-docs scribble-tools

      - name: Install nanopass
        run: raco pkg install --auto --skip-installed --no-docs nanopass

      - name: Cache wasm-tools binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/wasm-tools
          key: ${{ runner.os }}-wasm-tools-${{ env.WASM_TOOLS_VERSION }}

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install wasm-tools (prebuilt)
        run: |
          if [ ! -x "$HOME/.local/bin/wasm-tools" ]; then
            mkdir -p "$HOME/.local/bin"
            curl -L -o /tmp/wasm-tools.tar.gz \
              "https://github.com/bytecodealliance/wasm-tools/releases/download/v${WASM_TOOLS_VERSION}/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux.tar.gz"
            tar -xzf /tmp/wasm-tools.tar.gz -C /tmp
            cp "/tmp/wasm-tools-${WASM_TOOLS_VERSION}-x86_64-linux/wasm-tools" "$HOME/.local/bin/wasm-tools"
            chmod +x "$HOME/.local/bin/wasm-tools"
          fi
          wasm-tools --version

      - name: Link local webracket collection
        run: raco link "$GITHUB_WORKSPACE"

      - name: Compile web-easy examples
        run: |
          set -euo pipefail
          publish_root="web-site/public/web-easy-examples"
          rm -rf "$publish_root"
          mkdir -p "$publish_root"
          while IFS= read -r compile_sh; do
            example_dir="$(dirname "$compile_sh")"
            example_name="$(basename "$example_dir")"
            echo "Compiling $example_name"
            (cd "$example_dir" && bash ./compile.sh)
            mkdir -p "$publish_root/$example_name"
            cp -R "$example_dir/generated/." "$publish_root/$example_name/"
          done < <(find lib/web-easy/examples -mindepth 2 -maxdepth 2 -name compile.sh | sort)

      - name: Generate web-easy examples page
        run: bash web-site/src/generate-web-easy-examples-page.sh

      - name: Render WebRacket manual
        run: raco scribble --htmls --dest html scribblings/webracket.scrbl

      - name: Publish manual under /webracket/
        run: |
          rm -rf web-site/public/webracket
          mkdir -p web-site/public/webracket
          cp -R html/webracket/. web-site/public/webracket/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
