name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "scribblings/**"
      - "lib/web-easy/**"
      - "compiler.rkt"
      - "primitives.rkt"
      - "runtime-wasm.rkt"
      - "webracket.rkt"
      - "web-site/public/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.11
        with:
          architecture: x64
          distribution: full
          version: stable

      - name: Install Scribble tools
        run: raco pkg install --auto --skip-installed --no-docs scribble-tools

      - name: Link local webracket collection
        run: raco link "$GITHUB_WORKSPACE"

      - name: Compile web-easy examples
        run: |
          set -euo pipefail
          publish_root="web-site/public/web-easy-examples"
          rm -rf "$publish_root"
          mkdir -p "$publish_root"
          while IFS= read -r compile_sh; do
            example_dir="$(dirname "$compile_sh")"
            example_name="$(basename "$example_dir")"
            echo "Compiling $example_name"
            (cd "$example_dir" && bash ./compile.sh)
            mkdir -p "$publish_root/$example_name"
            cp -R "$example_dir/generated/." "$publish_root/$example_name/"
          done < <(find lib/web-easy/examples -mindepth 2 -maxdepth 2 -name compile.sh | sort)

      - name: Generate web-easy examples page
        run: |
          set -euo pipefail
          page="web-site/public/web-easy-examples.html"
          {
            cat <<'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web-Easy Examples</title>
  <style>
    :root { color-scheme: dark; --bg: #0c0d1a; --panel: rgba(20, 22, 40, 0.92); --text: #e6e8f2; --muted: #aeb4cc; --accent: #8f9dff; }
    html, body { margin: 0; min-height: 100%; background: radial-gradient(circle at top, rgba(101, 79, 240, 0.25), transparent 55%), var(--bg); color: var(--text); font-family: Inter, "Fira Code", system-ui, sans-serif; }
    body { line-height: 1.6; }
    main { max-width: 920px; margin: 0 auto; padding: 4rem 1.5rem 5rem; }
    .panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 2rem; box-shadow: 0 30px 80px rgba(0,0,0,0.35); }
    h1 { margin: 0 0 0.5rem; font-size: clamp(2.5rem, 5vw, 4rem); line-height: 1.05; }
    p { margin: 0 0 1rem; color: var(--muted); }
    ul { margin: 1.5rem 0 0; padding-left: 1.2rem; columns: 2; column-gap: 2rem; }
    li { margin: 0 0 0.55rem; break-inside: avoid; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    @media (max-width: 700px) { ul { columns: 1; } main { padding-inline: 1rem; } .panel { padding: 1.25rem; } }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Web-Easy Examples</h1>
      <p>Compiled example pages from <code>lib/web-easy/examples/</code>.</p>
      <ul>
EOF
            while IFS= read -r compile_sh; do
              example_dir="$(dirname "$compile_sh")"
              example_name="$(basename "$example_dir")"
              label="$(printf '%s' "$example_name" | perl -pe 's/-/ /g; s/(^| )([a-z])/$1\U$2/g')"
              printf '        <li><a href="web-easy-examples/%s/">%s</a></li>\n' "$example_name" "$label"
            done < <(find lib/web-easy/examples -mindepth 2 -maxdepth 2 -name compile.sh | sort)
            cat <<'EOF'
      </ul>
    </section>
  </main>
</body>
</html>
EOF
          } > "$page"

      - name: Render WebRacket manual
        run: raco scribble --htmls --dest html scribblings/webracket.scrbl

      - name: Publish manual under /webracket/
        run: |
          rm -rf web-site/public/webracket
          mkdir -p web-site/public/webracket
          cp -R html/webracket/. web-site/public/webracket/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-site/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
